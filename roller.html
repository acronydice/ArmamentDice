<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Forge of Fates — Dice Roller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,140,0,0.2);
    --border-bright: rgba(255,140,0,0.5);
    --gold: #e8a020;
    --gold-bright: #ffcc55;
    --ember: #ff5a00;
    --ember-dark: #c03800;
    --text: #f0e8d8;
    --text-muted: #9a8870;
    --danger: #ff3333;
    --radius: 8px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
    gap: 6px;
  }
  .tb-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .tb-btn:hover { background: rgba(255,140,0,0.12); border-color: var(--border-bright); color: var(--gold); }
  .tb-btn svg { flex-shrink: 0; }
  #topbar-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.08em;
    flex: 1;
    text-align: center;
  }

  /* CANVAS */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  #diceCanvas { display: block; width: 100%; height: 100%; }

  /* RESULT OVERLAY */
  #result-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    gap: 8px;
  }
  #result-overlay.show { opacity: 1; }
  #result-total {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(48px, 12vw, 96px);
    font-weight: 700;
    color: var(--gold-bright);
    text-shadow: 0 0 40px rgba(255,180,0,0.8), 0 0 80px rgba(255,100,0,0.4);
    line-height: 1;
  }
  #result-breakdown {
    font-family: 'EB Garamond', serif;
    font-size: clamp(12px, 3vw, 18px);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  #result-modifier-display {
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 3.5vw, 22px);
    color: var(--ember);
  }

  /* BOTTOM PANEL */
  #bottom-panel {
    background: rgba(0,0,0,0.85);
    border-top: 1px solid var(--border);
    padding: 8px 8px 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  /* DICE SELECTORS */
  #dice-selectors {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    width: 100%;
  }

  .die-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .die-card:hover { border-color: var(--border-bright); }
  .die-card.selected { background: rgba(255,140,0,0.1); border-color: var(--gold); }
  .die-card .die-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .die-card .die-icon svg { width: 28px; height: 28px; }
  .die-card .die-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  .die-card .die-stepper {
    display: flex;
    align-items: center;
    gap: 2px;
    width: 100%;
    justify-content: center;
  }
  .step-btn {
    width: 18px; height: 18px;
    background: rgba(255,140,0,0.12);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--gold);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: monospace;
    padding: 0;
    flex-shrink: 0;
  }
  .step-btn:hover { background: rgba(255,140,0,0.25); border-color: var(--gold); }
  .step-val {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text);
    min-width: 14px;
    text-align: center;
  }

  /* ROLL/RESET BUTTONS */
  #action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  #roll-btn {
    flex: 1;
    background: linear-gradient(135deg, #c84000, #e87000);
    border: 1px solid #ff8822;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(200,80,0,0.3);
  }
  #roll-btn:hover { background: linear-gradient(135deg, #e05000, #ff8800); box-shadow: 0 0 30px rgba(255,120,0,0.5); }
  #roll-btn:active { transform: scale(0.97); }
  #roll-btn.rolling { animation: rollPulse 0.6s infinite alternate; }
  @keyframes rollPulse {
    from { box-shadow: 0 0 20px rgba(255,120,0,0.4); }
    to { box-shadow: 0 0 40px rgba(255,200,0,0.7); }
  }
  #reset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #reset-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,50,50,0.08); }

  /* MODIFIER DISPLAY */
  #modifier-chip {
    background: rgba(255,140,0,0.1);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #modifier-chip:hover { border-color: var(--gold); background: rgba(255,140,0,0.18); }

  /* SHAKE HINT */
  #shake-hint {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    color: rgba(255,140,0,0.3);
    pointer-events: none;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  /* PANEL OVERLAY */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .panel-overlay.open { opacity: 1; pointer-events: all; }
  .panel-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 85dvh;
    overflow-y: auto;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  .panel-overlay.open .panel-sheet { transform: translateY(0); }
  .panel-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 0.06em;
  }
  .panel-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .panel-close:hover { color: var(--text); }

  /* SETTINGS SECTIONS */
  .setting-section {
    margin-bottom: 24px;
  }
  .setting-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .option-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    padding: 8px 14px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .opt-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .opt-btn.active { background: rgba(255,140,0,0.15); border-color: var(--gold); color: var(--gold-bright); }
  .color-picker-row { display: flex; align-items: center; gap: 12px; }
  input[type="color"] {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    padding: 2px;
    background: var(--surface2);
  }

  /* MODIFIER INPUT */
  .modifier-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .mod-btn {
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
    transition: all 0.15s;
  }
  .mod-btn:hover { background: rgba(255,140,0,0.15); border-color: var(--gold); }
  #mod-value {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--text);
    min-width: 50px;
    text-align: center;
  }
  .input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    width: 100%;
    outline: none;
    margin-bottom: 8px;
  }
  .input-field:focus { border-color: var(--gold); }

  /* HISTORY LIST */
  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .hist-total {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold-bright);
    flex-shrink: 0;
  }
  .hist-detail {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }
  .hist-time {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* SAVED CONFIGS */
  .saved-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .saved-card:hover { border-color: var(--border-bright); background: rgba(255,140,0,0.05); }
  .saved-card-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); margin-bottom: 4px; }
  .saved-card-detail { font-family: 'EB Garamond', serif; font-size: 12px; color: var(--text-muted); }
  .saved-delete {
    float: right;
    background: none; border: none; color: rgba(255,80,80,0.4); font-size: 16px; cursor: pointer;
    padding: 0; transition: color 0.2s;
  }
  .saved-delete:hover { color: var(--danger); }

  /* ADV/DIS buttons in topbar */
  .adv-btn {
    background: rgba(0,200,100,0.08);
    border: 1px solid rgba(0,200,100,0.2);
    color: rgba(0,220,100,0.7);
  }
  .adv-btn.active { background: rgba(0,200,100,0.2); border-color: rgba(0,255,120,0.6); color: #00ff88; }
  .dis-btn {
    background: rgba(200,50,50,0.08);
    border: 1px solid rgba(200,50,50,0.2);
    color: rgba(220,80,80,0.7);
  }
  .dis-btn.active { background: rgba(200,50,50,0.2); border-color: rgba(255,80,80,0.6); color: #ff5555; }

  /* Responsive */
  @media (min-width: 600px) {
    .die-card { min-width: 80px; }
    .panel-sheet { border-radius: 20px 20px 0 0; }
  }

  /* SVG die icons */
  .die-svg { fill: none; stroke: currentColor; stroke-width: 1.5; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button class="tb-btn" onclick="openPanel('menu')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="4" width="12" height="1.5" rx="0.75"/><rect x="2" y="7.25" width="12" height="1.5" rx="0.75"/><rect x="2" y="10.5" width="12" height="1.5" rx="0.75"/></svg>
    Menu
  </button>
  <button class="tb-btn adv-btn" id="adv-btn" onclick="toggleAdv()">ADV</button>
  <div id="topbar-title">Forge of Fates</div>
  <button class="tb-btn dis-btn" id="dis-btn" onclick="toggleDis()">DIS</button>
  <button class="tb-btn" id="shake-btn" onclick="requestMotionPermission()" title="Enable shake to roll">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg>
    Shake
  </button>
  <button class="tb-btn" onclick="openPanel('history')">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5.5"/><polyline points="7,4 7,7 9,9"/></svg>
    Log
  </button>
</div>

<!-- 3D CANVAS -->
<div id="canvas-wrap">
  <canvas id="diceCanvas"></canvas>
  <div id="result-overlay">
    <div id="result-total">—</div>
    <div id="result-breakdown"></div>
    <div id="result-modifier-display"></div>
  </div>
  <div id="shake-hint">shake to roll • tap to roll</div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
  <div id="dice-selectors">
    <!-- filled by JS -->
  </div>
  <div id="action-row">
    <button id="modifier-chip" onclick="openPanel('modifier')">MOD: +0</button>
    <button id="roll-btn" onclick="initiateRoll()">⚔ ROLL THE DICE</button>
    <button id="reset-btn" onclick="resetAll()">✕</button>
  </div>
</div>

<!-- MENU PANEL -->
<div class="panel-overlay" id="panel-menu" onclick="closePanelOnOverlay(event,'panel-menu')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('menu')">✕</button>
    <div class="panel-title">Settings</div>

    <div class="setting-section">
      <div class="setting-label">Dice Skin</div>
      <div class="option-grid" id="skin-options"></div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Background</div>
      <div class="option-grid" id="bg-options"></div>
      <div class="color-picker-row" style="margin-top:10px">
        <span style="font-size:13px;color:var(--text-muted)">Custom BG color:</span>
        <input type="color" id="bg-color-picker" value="#0a0a0a" oninput="setCustomBg(this.value)">
      </div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Roll Sound</div>
      <div class="option-grid" id="sound-options"></div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Saved Configurations</div>
      <button class="opt-btn" style="width:100%;margin-bottom:12px" onclick="openPanel('save')">+ Save Current Config</button>
      <div id="saved-list"></div>
    </div>
  </div>
</div>

<!-- MODIFIER PANEL -->
<div class="panel-overlay" id="panel-modifier" onclick="closePanelOnOverlay(event,'panel-modifier')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('modifier')">✕</button>
    <div class="panel-title">Roll Modifier</div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">Add a flat bonus or penalty to the total roll.</p>
    <div class="modifier-row" style="justify-content:center">
      <button class="mod-btn" onclick="changeModifier(-5)">−5</button>
      <button class="mod-btn" onclick="changeModifier(-1)">−</button>
      <div id="mod-value">+0</div>
      <button class="mod-btn" onclick="changeModifier(1)">+</button>
      <button class="mod-btn" onclick="changeModifier(5)">+5</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="opt-btn" onclick="setModifier(0)">Reset to 0</button>
    </div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel-overlay" id="panel-history" onclick="closePanelOnOverlay(event,'panel-history')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('history')">✕</button>
    <div class="panel-title">Roll History</div>
    <button class="opt-btn" style="margin-bottom:14px" onclick="clearHistory()">Clear History</button>
    <div id="history-list"><p style="color:var(--text-muted);font-size:14px">No rolls yet.</p></div>
  </div>
</div>

<!-- SAVE PANEL -->
<div class="panel-overlay" id="panel-save" onclick="closePanelOnOverlay(event,'panel-save')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('save')">✕</button>
    <div class="panel-title">Save Configuration</div>
    <input class="input-field" id="save-name" placeholder="Configuration name (e.g. Attack Roll)">
    <button class="opt-btn active" style="width:100%" onclick="saveCurrentConfig()">Save</button>
  </div>
</div>

<!-- Three.js + Cannon.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const DICE_TYPES = ['D4','D6','D8','D10','D12','D20'];
const DICE_SIDES = {D4:4,D6:6,D8:8,D10:10,D12:12,D20:20};
let diceConfig = {D4:0,D6:0,D8:0,D10:0,D12:0,D20:0};
let modifier = 0;
let advantage = false;
let disadvantage = false;
let rollHistory = [];
let savedConfigs = JSON.parse(localStorage.getItem('fof_saved') || '[]');
let rollHistory_store = JSON.parse(localStorage.getItem('fof_history') || '[]');
rollHistory = rollHistory_store;

const SKINS = [
  {id:'lava',    name:'Lava',    color1:'#ff4400', color2:'#cc2200', emissive:'#882200'},
  {id:'ice',     name:'Ice',     color1:'#88ccff', color2:'#4499dd', emissive:'#114488'},
  {id:'void',    name:'Void',    color1:'#220044', color2:'#440088', emissive:'#330055'},
  {id:'gold',    name:'Gold',    color1:'#ffcc44', color2:'#cc8822', emissive:'#884400'},
  {id:'forest',  name:'Forest',  color1:'#224422', color2:'#336633', emissive:'#112211'},
  {id:'bone',    name:'Bone',    color1:'#e8dcc8', color2:'#c8b898', emissive:'#887766'},
  {id:'blood',   name:'Blood',   color1:'#880011', color2:'#660009', emissive:'#440006'},
  {id:'sky',     name:'Sky',     color1:'#6699ff', color2:'#4477dd', emissive:'#224488'},
];
const BG_OPTIONS = [
  {id:'dark',   name:'Dark',     fn: () => setBackground('dark')},
  {id:'stone',  name:'Stone',    fn: () => setBackground('stone')},
  {id:'snow',   name:'Snow',     fn: () => setBackground('snow')},
  {id:'grid',   name:'Grid',     fn: () => setBackground('grid')},
  {id:'ember',  name:'Embers',   fn: () => setBackground('ember')},
  {id:'none',   name:'None',     fn: () => setBackground('none')},
];
const SOUNDS = [
  {id:'default', name:'Dice Clatter'},
  {id:'thunder', name:'Thunder'},
  {id:'sword',   name:'Sword'},
  {id:'explosion', name:'Explosion'},
  {id:'fireball', name:'Fireball'},
  {id:'magic',   name:'Magic'},
  {id:'ice',     name:'Ice Crystal'},
];

let currentSkin = 'lava';
let currentBg = 'dark';
let currentSound = 'default';
let bgAnimFrame = null;
let bgCanvas = null;
let bgCtx = null;
let bgParticles = [];

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudio();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.35, now);
    master.connect(ctx.destination);

    if (type === 'default') {
      for (let i = 0; i < 6; i++) {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < data.length; j++) data[j] = (Math.random()*2-1) * (1 - j/data.length);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const flt = ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 1200 + Math.random()*800;
        src.connect(flt); flt.connect(master);
        src.start(now + i * 0.08 + Math.random()*0.04);
      }
    } else if (type === 'thunder') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random()*2-1) * Math.pow(1 - j/data.length, 0.5);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 200;
      src.connect(flt); flt.connect(master); src.start(now);
    } else if (type === 'sword') {
      const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
      const env = ctx.createGain(); env.gain.setValueAtTime(0.5, now); env.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.connect(env); env.connect(master); osc.start(now); osc.stop(now + 0.35);
    } else if (type === 'explosion') {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.8, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random()*2-1) * Math.exp(-j/(ctx.sampleRate*0.3));
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 300;
      src.connect(flt); flt.connect(master); src.start(now);
    } else if (type === 'fireball') {
      const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.5);
      const env = ctx.createGain(); env.gain.setValueAtTime(0.7, now); env.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      const flt = ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 800; flt.Q.value = 0.5;
      osc.connect(flt); flt.connect(env); env.connect(master); osc.start(now); osc.stop(now + 0.6);
    } else if (type === 'magic') {
      for (let i = 0; i < 4; i++) {
        const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 440 * Math.pow(1.5, i);
        const env = ctx.createGain(); env.gain.setValueAtTime(0, now + i*0.06); env.gain.linearRampToValueAtTime(0.3, now+i*0.06+0.05); env.gain.exponentialRampToValueAtTime(0.001, now+i*0.06+0.4);
        osc.connect(env); env.connect(master); osc.start(now+i*0.06); osc.stop(now+i*0.06+0.4);
      }
    } else if (type === 'ice') {
      for (let i = 0; i < 8; i++) {
        const osc = ctx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = 1200 + i * 400;
        const env = ctx.createGain(); env.gain.setValueAtTime(0.15, now+i*0.04); env.gain.exponentialRampToValueAtTime(0.001, now+i*0.04+0.2);
        osc.connect(env); env.connect(master); osc.start(now+i*0.04); osc.stop(now+i*0.04+0.2);
      }
    }
  } catch(e) {}
}

// ─── THREE.JS SCENE ──────────────────────────────────────────────────────────
let renderer, scene, camera, world;
let diceMeshes = [];
let diceBodies = [];
let animating = false;
let rollDone = false;

function initThree() {
  const canvas = document.getElementById('diceCanvas');
  const wrap = document.getElementById('canvas-wrap');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
  camera.position.set(0, 8, 10);
  camera.lookAt(0, 0, 0);

  // Lighting
  const ambient = new THREE.AmbientLight(0x331100, 1.5);
  scene.add(ambient);
  const spot = new THREE.SpotLight(0xff8833, 3, 30, Math.PI/4, 0.5);
  spot.position.set(0, 12, 0);
  spot.castShadow = true;
  spot.shadow.mapSize.width = 1024;
  spot.shadow.mapSize.height = 1024;
  scene.add(spot);
  const fill = new THREE.DirectionalLight(0xff5500, 0.8);
  fill.position.set(-5, 5, -3);
  scene.add(fill);

  // Ground plane (invisible)
  const groundGeo = new THREE.PlaneGeometry(50, 50);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1;
  ground.receiveShadow = true;
  scene.add(ground);

  // Physics world
  world = new CANNON.World();
  world.gravity.set(0, -20, 0);
  world.broadphase = new CANNON.NaiveBroadphase();
  world.solver.iterations = 10;

  // Ground body
  const groundBody = new CANNON.Body({ mass: 0 });
  groundBody.addShape(new CANNON.Plane());
  groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
  groundBody.position.y = -1;
  world.addBody(groundBody);

  // Walls
  [[-8,0,0],[8,0,0],[0,0,-8],[0,0,8]].forEach(([x,y,z]) => {
    const wallBody = new CANNON.Body({ mass: 0 });
    wallBody.addShape(new CANNON.Plane());
    wallBody.position.set(x, y, z);
    if (x !== 0) wallBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0,1,0), x > 0 ? -Math.PI/2 : Math.PI/2);
    if (z !== 0) wallBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), z > 0 ? Math.PI : 0);
    world.addBody(wallBody);
  });

  resizeRenderer();
  window.addEventListener('resize', resizeRenderer);
  renderer.setAnimationLoop(renderLoop);
}

function resizeRenderer() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

let lastTime = 0;
function renderLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (animating) {
    world.step(1/60, dt, 3);
    diceMeshes.forEach((mesh, i) => {
      if (!diceBodies[i]) return;
      mesh.position.copy(diceBodies[i].position);
      mesh.quaternion.copy(diceBodies[i].quaternion);
    });

    // Check if dice settled
    if (time > rollStartTime + 2000) {
      const allStopped = diceBodies.every(b =>
        b.velocity.length() < 0.3 && b.angularVelocity.length() < 0.3
      );
      if (allStopped || time > rollStartTime + 4500) {
        animating = false;
        showResults();
      }
    }
  }

  updateBgParticles();
  renderer.render(scene, camera);
}

// ─── DICE GEOMETRY ───────────────────────────────────────────────────────────
function createDiceGeometry(type) {
  switch(type) {
    case 'D4':  return new THREE.TetrahedronGeometry(0.7);
    case 'D6':  return new THREE.BoxGeometry(0.9, 0.9, 0.9, 1, 1, 1);
    case 'D8':  return new THREE.OctahedronGeometry(0.75);
    case 'D10': return new THREE.DodecahedronGeometry(0.65, 0); // approximate
    case 'D12': return new THREE.DodecahedronGeometry(0.7);
    case 'D20': return new THREE.IcosahedronGeometry(0.75);
    default:    return new THREE.BoxGeometry(0.9,0.9,0.9);
  }
}

function createDicePhysicsShape(type) {
  const r = 0.5;
  switch(type) {
    case 'D6':  return new CANNON.Box(new CANNON.Vec3(0.45,0.45,0.45));
    default:    return new CANNON.Sphere(0.5);
  }
}

function getSkinMaterial(skinId) {
  const skin = SKINS.find(s => s.id === skinId) || SKINS[0];
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(skin.color1),
    emissive: new THREE.Color(skin.emissive),
    emissiveIntensity: 0.5,
    roughness: 0.3,
    metalness: 0.2,
    wireframe: false,
  });
}

// ─── ROLL LOGIC ──────────────────────────────────────────────────────────────
let rollStartTime = 0;
let currentResults = [];
let currentDiceRolled = {};

function buildDiceForRoll() {
  // Clear existing
  diceMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  diceBodies.forEach(b => world.remove(b));
  diceMeshes = []; diceBodies = [];
  currentResults = []; currentDiceRolled = {};

  const mat = getSkinMaterial(currentSkin);

  DICE_TYPES.forEach(type => {
    let count = diceConfig[type];
    if (advantage || disadvantage) {
      // For advantage/disadvantage, only apply if single die type with count 1
      if (Object.values(diceConfig).reduce((a,b)=>a+b,0) === 1 && count === 1) count = 2;
    }
    for (let i = 0; i < count; i++) {
      const geo = createDiceGeometry(type);
      const mesh = new THREE.Mesh(geo, mat.clone());
      mesh.castShadow = true;
      mesh.userData.type = type;
      mesh.userData.result = 0;
      scene.add(mesh);
      diceMeshes.push(mesh);

      // Physics body
      const body = new CANNON.Body({ mass: 1 });
      body.addShape(createDicePhysicsShape(type));
      body.linearDamping = 0.2;
      body.angularDamping = 0.2;

      // Random spawn above tray
      const px = (Math.random()-0.5)*6;
      const pz = (Math.random()-0.5)*6;
      const py = 4 + Math.random()*3;
      body.position.set(px, py, pz);

      // Random initial velocity
      body.velocity.set((Math.random()-0.5)*8, -2+Math.random()*(-4), (Math.random()-0.5)*8);
      body.angularVelocity.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);

      // Random initial rotation
      body.quaternion.setFromEuler(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);

      world.addBody(body);
      diceBodies.push(body);

      // Roll the result
      const sides = DICE_SIDES[type];
      const roll = Math.floor(Math.random() * sides) + 1;
      mesh.userData.result = roll;
      currentDiceRolled[type] = (currentDiceRolled[type] || []);
      currentDiceRolled[type].push(roll);
    }
  });
}

let rollBtnElem = null;
function initiateRoll() {
  const total = Object.values(diceConfig).reduce((a,b)=>a+b,0);
  if (total === 0) { flashBtnError(); return; }

  try { getAudio().resume(); } catch(e){}
  playSound(currentSound);

  document.getElementById('result-overlay').classList.remove('show');
  rollDone = false;

  buildDiceForRoll();

  animating = true;
  rollStartTime = performance.now();

  const btn = document.getElementById('roll-btn');
  btn.textContent = '⚡ ROLLING...';
  btn.classList.add('rolling');
}

function flashBtnError() {
  const btn = document.getElementById('roll-btn');
  btn.style.background = 'rgba(255,50,50,0.3)';
  setTimeout(() => { btn.style.background = ''; }, 500);
}

function showResults() {
  if (rollDone) return;
  rollDone = true;

  const btn = document.getElementById('roll-btn');
  btn.textContent = '⚔ ROLL THE DICE';
  btn.classList.remove('rolling');

  // Handle advantage/disadvantage
  let results = {};
  let breakdown = [];
  let rawTotal = 0;
  const singleDieType = Object.keys(currentDiceRolled).find(k => currentDiceRolled[k] && currentDiceRolled[k].length === 2);

  if ((advantage || disadvantage) && singleDieType && Object.keys(currentDiceRolled).length === 1) {
    const rolls = currentDiceRolled[singleDieType];
    const chosen = advantage ? Math.max(...rolls) : Math.min(...rolls);
    rawTotal = chosen;
    breakdown.push(`${singleDieType} [${rolls.join(',')}] → ${advantage?'ADV':'DIS'}: ${chosen}`);
  } else {
    DICE_TYPES.forEach(type => {
      if (!currentDiceRolled[type]) return;
      currentDiceRolled[type].forEach(r => {
        rawTotal += r;
        breakdown.push(`${type}: ${r}`);
      });
    });
  }

  const finalTotal = rawTotal + modifier;

  document.getElementById('result-total').textContent = finalTotal;
  document.getElementById('result-breakdown').textContent = breakdown.join(' · ');
  document.getElementById('result-modifier-display').textContent =
    modifier !== 0 ? `(${rawTotal} ${modifier >= 0 ? '+' : ''}${modifier} modifier)` : '';
  document.getElementById('result-overlay').classList.add('show');

  // Save to history
  const entry = {
    total: finalTotal,
    raw: rawTotal,
    modifier,
    breakdown: breakdown.join(' · '),
    config: Object.assign({}, diceConfig),
    skin: currentSkin,
    time: new Date().toLocaleTimeString()
  };
  rollHistory.unshift(entry);
  if (rollHistory.length > 50) rollHistory.pop();
  try { localStorage.setItem('fof_history', JSON.stringify(rollHistory)); } catch(e){}

  // Arrange dice in a neat grid then zoom camera to frame them all
  arrangeDiceGrid(() => zoomToFitAll());
}

// Arrange all settled dice into a tidy grid so nothing overlaps
function arrangeDiceGrid(onDone) {
  const n = diceMeshes.length;
  if (n === 0) { onDone && onDone(); return; }

  const SPACING = 1.5; // gap between die centres
  // Compute grid cols/rows to be as square as possible, favouring wider layouts
  const cols = Math.ceil(Math.sqrt(n * (camera.aspect || 1)));
  const rows = Math.ceil(n / cols);

  // Target positions centred on origin
  const targets = [];
  for (let i = 0; i < n; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const tx = (col - (cols - 1) / 2) * SPACING;
    const tz = (row - (rows - 1) / 2) * SPACING;
    targets.push({ x: tx, y: -1 + 0.55, z: tz }); // rest on the ground at y=-1, half-size up
  }

  // Animate mesh positions smoothly (physics done, just tween meshes)
  const dur = 500;
  const startTime = performance.now();
  const startPositions = diceMeshes.map(m => ({ x: m.position.x, y: m.position.y, z: m.position.z }));

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function animStep(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const e = ease(t);
    diceMeshes.forEach((mesh, i) => {
      mesh.position.x = startPositions[i].x + (targets[i].x - startPositions[i].x) * e;
      mesh.position.y = startPositions[i].y + (targets[i].y - startPositions[i].y) * e;
      mesh.position.z = startPositions[i].z + (targets[i].z - startPositions[i].z) * e;
    });
    if (t < 1) {
      requestAnimationFrame(animStep);
    } else {
      onDone && onDone();
    }
  }
  requestAnimationFrame(animStep);
}

// Compute bounding box of all dice and fit the camera to show all of them
function zoomToFitAll() {
  const n = diceMeshes.length;
  if (n === 0) return;

  // Find bounding box centre and extents
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  diceMeshes.forEach(m => {
    minX = Math.min(minX, m.position.x);
    maxX = Math.max(maxX, m.position.x);
    minZ = Math.min(minZ, m.position.z);
    maxZ = Math.max(maxZ, m.position.z);
  });

  const cx = (minX + maxX) / 2;
  const cz = (minZ + maxZ) / 2;
  const extentX = (maxX - minX) / 2 + 1.2; // padding
  const extentZ = (maxZ - minZ) / 2 + 1.2;

  // Camera looks down at a slight angle from above.
  // We want all dice in the frustum. Camera is at (cx, H, cz + D) looking at (cx, groundY, cz).
  // Using vertical FOV=55deg and aspect ratio, compute required distance.
  const fovRad = (camera.fov * Math.PI) / 180;
  const aspect = camera.aspect || 1;
  // Half-height visible at distance D from target: tan(fov/2)*D
  // Half-width visible: aspect * tan(fov/2)*D
  // We need: tan(fov/2)*D >= extentZ  AND  aspect*tan(fov/2)*D >= extentX
  const tanHalf = Math.tan(fovRad / 2);
  const distForZ = extentZ / tanHalf;
  const distForX = extentX / (aspect * tanHalf);
  const dist = Math.max(distForZ, distForX, 3); // minimum zoom

  // Camera sits at angle: D along z-axis offset, H up, so it looks down 35°
  const angle = 38 * Math.PI / 180;
  const camD = dist * Math.cos(angle);
  const camH = dist * Math.sin(angle) + 0.5;

  const startX = camera.position.x;
  const startY = camera.position.y;
  const startZ = camera.position.z;
  const targetX = cx;
  const targetY = camH;
  const targetZ = cz + camD;

  const dur = 700;
  const startTime = performance.now();
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const e = ease(t);
    camera.position.x = startX + (targetX - startX) * e;
    camera.position.y = startY + (targetY - startY) * e;
    camera.position.z = startZ + (targetZ - startZ) * e;
    camera.lookAt(cx, -0.5, cz);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function resetCamera() {
  const targetY = 8; const targetZ = 10;
  const startY = camera.position.y; const startZ = camera.position.z;
  const dur = 500; const start = performance.now();
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function step(now) {
    const t = Math.min((now-start)/dur, 1);
    const e = ease(t);
    camera.position.y = startY + (targetY - startY) * e;
    camera.position.z = startZ + (targetZ - startZ) * e;
    camera.lookAt(0, 0, 0);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function resetAll() {
  DICE_TYPES.forEach(t => diceConfig[t] = 0);
  diceMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  diceBodies.forEach(b => world.remove(b));
  diceMeshes = []; diceBodies = [];
  animating = false; rollDone = false;
  document.getElementById('result-overlay').classList.remove('show');
  resetCamera();
  renderDiceSelectors();
}

// ─── SHAKE TO ROLL ────────────────────────────────────────────────────────────
// Robust shake detector: uses a short history of acceleration magnitudes.
// Works on Android (no permission needed) and iOS 13+ (needs user-gesture permission).

let shakeActive = false;
let shakeListener = null;
let lastShakeTime = 0;

// Sliding window of recent acceleration samples for shake detection
const SHAKE_WINDOW = 300;   // ms window to evaluate
const SHAKE_THRESHOLD = 18; // m/s² — robust across Android devices
let shakeSamples = [];       // [{t, mag}]

function onMotionEvent(e) {
  // Prefer raw acceleration (no gravity) when available; fall back to with-gravity
  const raw = e.acceleration;
  const withG = e.accelerationIncludingGravity;

  let ax = 0, ay = 0, az = 0;
  if (raw && raw.x != null) {
    ax = raw.x || 0; ay = raw.y || 0; az = raw.z || 0;
  } else if (withG && withG.x != null) {
    ax = withG.x || 0; ay = withG.y || 0; az = withG.z || 0;
  } else return;

  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  const now = Date.now();

  // Keep only samples within the rolling window
  shakeSamples.push({ t: now, mag });
  shakeSamples = shakeSamples.filter(s => now - s.t < SHAKE_WINDOW);

  // Trigger if any sample in the window exceeds the threshold
  const peak = shakeSamples.reduce((m, s) => Math.max(m, s.mag), 0);
  if (peak >= SHAKE_THRESHOLD && now - lastShakeTime > 1200) {
    lastShakeTime = now;
    shakeSamples = []; // reset to avoid re-triggering
    initiateRoll();
  }
}

function setShakeButtonState(active, message) {
  const btn = document.getElementById('shake-btn');
  if (!btn) return;
  if (active) {
    btn.style.color = 'var(--gold)';
    btn.style.borderColor = 'rgba(255,180,0,0.5)';
    btn.title = 'Shake active — shake device to roll';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg> Shake ✓`;
  } else {
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.title = message || 'Tap to enable shake-to-roll';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg> Shake`;
  }
}

function enableShake() {
  if (shakeActive) return; // already on, idempotent
  if (shakeListener) {
    window.removeEventListener('devicemotion', shakeListener);
    shakeListener = null;
  }
  shakeListener = onMotionEvent;
  window.addEventListener('devicemotion', shakeListener);
  shakeActive = true;
  setShakeButtonState(true);
}

function requestMotionPermission() {
  // iOS 13+ requires explicit permission from a user gesture
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          enableShake();
        } else {
          setShakeButtonState(false, 'Permission denied');
        }
      })
      .catch(() => setShakeButtonState(false, 'Permission error'));
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    // Android and other browsers — no permission step needed
    enableShake();
  } else {
    // Desktop or unsupported browser
    setShakeButtonState(false, 'Accelerometer not supported');
  }
}

// Touch to roll on canvas
document.getElementById('canvas-wrap').addEventListener('click', () => {
  if (!animating && !rollDone) initiateRoll();
  else if (rollDone) {
    document.getElementById('result-overlay').classList.remove('show');
    rollDone = false;
    resetCamera();
  }
});

  D4:  `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><polygon points="18,4 32,30 4,30" stroke-linejoin="round"/><line x1="18" y1="4" x2="18" y2="30"/></svg>`,
  D6:  `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><rect x="5" y="5" width="26" height="26" rx="4"/><circle cx="11" cy="11" r="2" fill="currentColor"/><circle cx="25" cy="25" r="2" fill="currentColor"/></svg>`,
  D8:  `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><polygon points="18,3 33,18 18,33 3,18" stroke-linejoin="round"/></svg>`,
  D10: `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><polygon points="18,3 33,13 28,30 8,30 3,13" stroke-linejoin="round"/></svg>`,
  D12: `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><polygon points="18,3 30,10 33,24 24,33 12,33 3,24 6,10" stroke-linejoin="round"/></svg>`,
  D20: `<svg class="die-svg" width="36" height="36" viewBox="0 0 36 36"><polygon points="18,3 31,11 31,25 18,33 5,25 5,11" stroke-linejoin="round"/><line x1="18" y1="3" x2="5" y2="25"/><line x1="18" y1="3" x2="31" y2="25"/><line x1="5" y1="11" x2="31" y2="11"/></svg>`,
};

function renderDiceSelectors() {
  const container = document.getElementById('dice-selectors');
  container.innerHTML = '';
  DICE_TYPES.forEach(type => {
    const count = diceConfig[type];
    const card = document.createElement('div');
    card.className = 'die-card' + (count > 0 ? ' selected' : '');
    card.innerHTML = `
      <div class="die-icon" style="color:${count>0?'var(--gold)':'var(--text-muted)'}">
        ${DIE_SVGS[type]}
      </div>
      <div class="die-label">${type}</div>
      <div class="die-stepper">
        <button class="step-btn" onclick="changeDie('${type}',-1)">−</button>
        <div class="step-val">${count}</div>
        <button class="step-btn" onclick="changeDie('${type}',1)">+</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function changeDie(type, delta) {
  diceConfig[type] = Math.max(0, Math.min(20, (diceConfig[type] || 0) + delta));
  renderDiceSelectors();
}

// ─── PANELS ───────────────────────────────────────────────────────────────────
function openPanel(name) {
  if (name === 'menu') renderMenuPanel();
  if (name === 'history') renderHistoryPanel();
  if (name === 'save') {}
  document.getElementById('panel-' + name).classList.add('open');
}
function closePanel(name) {
  document.getElementById('panel-' + name).classList.remove('open');
}
function closePanelOnOverlay(e, id) {
  if (e.target.id === id) closePanel(id.replace('panel-',''));
}

function renderMenuPanel() {
  // Skins
  const skinEl = document.getElementById('skin-options');
  skinEl.innerHTML = '';
  SKINS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'opt-btn' + (currentSkin === s.id ? ' active' : '');
    b.textContent = s.name;
    b.onclick = () => { currentSkin = s.id; renderMenuPanel(); };
    skinEl.appendChild(b);
  });

  // Backgrounds
  const bgEl = document.getElementById('bg-options');
  bgEl.innerHTML = '';
  BG_OPTIONS.forEach(bg => {
    const b = document.createElement('button');
    b.className = 'opt-btn' + (currentBg === bg.id ? ' active' : '');
    b.textContent = bg.name;
    b.onclick = () => { currentBg = bg.id; bg.fn(); renderMenuPanel(); };
    bgEl.appendChild(b);
  });

  // Sounds
  const sndEl = document.getElementById('sound-options');
  sndEl.innerHTML = '';
  SOUNDS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'opt-btn' + (currentSound === s.id ? ' active' : '');
    b.textContent = s.name;
    b.onclick = () => { currentSound = s.id; try{getAudio().resume();}catch(e){} playSound(s.id); renderMenuPanel(); };
    sndEl.appendChild(b);
  });

  // Saved configs
  renderSavedList();
}

function renderHistoryPanel() {
  const el = document.getElementById('history-list');
  if (rollHistory.length === 0) {
    el.innerHTML = '<p style="color:var(--text-muted);font-size:14px">No rolls yet.</p>'; return;
  }
  el.innerHTML = '';
  rollHistory.slice(0, 30).forEach(entry => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="hist-total">${entry.total}</div>
      <div class="hist-detail">${entry.breakdown}${entry.modifier ? ` (mod ${entry.modifier>=0?'+':''}${entry.modifier})` : ''}</div>
      <div class="hist-time">${entry.time}</div>
    `;
    el.appendChild(item);
  });
}

function clearHistory() {
  rollHistory = [];
  try { localStorage.removeItem('fof_history'); } catch(e){}
  renderHistoryPanel();
}

function renderSavedList() {
  const el = document.getElementById('saved-list');
  if (savedConfigs.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--text-muted)">No saved configurations.</p>'; return;
  }
  el.innerHTML = '';
  savedConfigs.forEach((cfg, i) => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.innerHTML = `
      <button class="saved-delete" onclick="deleteSaved(${i})">✕</button>
      <div class="saved-card-title">${cfg.name}</div>
      <div class="saved-card-detail">${formatConfig(cfg)} · Skin: ${cfg.skin} · BG: ${cfg.bg || 'dark'} · Mod: ${cfg.modifier >= 0 ? '+' : ''}${cfg.modifier}</div>
    `;
    card.onclick = (e) => { if (!e.target.classList.contains('saved-delete')) loadSaved(i); };
    el.appendChild(card);
  });
}

function formatConfig(cfg) {
  return DICE_TYPES.filter(t => cfg.dice[t] > 0).map(t => `${cfg.dice[t]}${t}`).join(' + ') || 'No dice';
}

function saveCurrentConfig() {
  const name = document.getElementById('save-name').value.trim() || 'Roll Config';
  const cfg = {
    name,
    dice: Object.assign({}, diceConfig),
    modifier,
    skin: currentSkin,
    sound: currentSound,
    bg: currentBg,
    customBgColor: document.getElementById('bg-color-picker').value
  };
  savedConfigs.push(cfg);
  try { localStorage.setItem('fof_saved', JSON.stringify(savedConfigs)); } catch(e){}
  document.getElementById('save-name').value = '';
  closePanel('save');
  renderSavedList();
}

function deleteSaved(i) {
  savedConfigs.splice(i, 1);
  try { localStorage.setItem('fof_saved', JSON.stringify(savedConfigs)); } catch(e){}
  renderSavedList();
}

function loadSaved(i) {
  const cfg = savedConfigs[i];
  Object.assign(diceConfig, cfg.dice);
  modifier = cfg.modifier;
  currentSkin = cfg.skin;
  currentSound = cfg.sound;
  if (cfg.bg) {
    setBackground(cfg.bg);
    if (cfg.bg === 'custom' && cfg.customBgColor) {
      setCustomBg(cfg.customBgColor);
      document.getElementById('bg-color-picker').value = cfg.customBgColor;
    } else if (cfg.customBgColor && cfg.bg === 'dark') {
      // may have used custom color picker on top of dark
      document.getElementById('bg-color-picker').value = cfg.customBgColor;
    }
  }
  updateModifierDisplay();
  renderDiceSelectors();
  closePanel('menu');
}

// ─── MODIFIER ─────────────────────────────────────────────────────────────────
function changeModifier(delta) { setModifier(modifier + delta); }
function setModifier(val) {
  modifier = Math.max(-99, Math.min(99, val));
  updateModifierDisplay();
}
function updateModifierDisplay() {
  document.getElementById('mod-value').textContent = (modifier >= 0 ? '+' : '') + modifier;
  document.getElementById('modifier-chip').textContent = 'MOD: ' + (modifier >= 0 ? '+' : '') + modifier;
}

// ─── ADV/DIS ──────────────────────────────────────────────────────────────────
function toggleAdv() {
  advantage = !advantage;
  if (advantage) disadvantage = false;
  document.getElementById('adv-btn').classList.toggle('active', advantage);
  document.getElementById('dis-btn').classList.toggle('active', false);
}
function toggleDis() {
  disadvantage = !disadvantage;
  if (disadvantage) advantage = false;
  document.getElementById('dis-btn').classList.toggle('active', disadvantage);
  document.getElementById('adv-btn').classList.toggle('active', false);
}

// ─── BACKGROUND EFFECTS ───────────────────────────────────────────────────────
function setBackground(type) {
  currentBg = type;
  cancelAnimationFrame(bgAnimFrame);
  bgParticles = [];

  const wrap = document.getElementById('canvas-wrap');
  if (bgCanvas) { bgCanvas.remove(); bgCanvas = null; }

  if (type === 'snow' || type === 'ember' || type === 'grid') {
    bgCanvas = document.createElement('canvas');
    bgCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1';
    wrap.insertBefore(bgCanvas, wrap.firstChild);
    bgCtx = bgCanvas.getContext('2d');
    resizeBg();
    window.addEventListener('resize', resizeBg);

    if (type === 'snow') initSnow();
    else if (type === 'ember') initEmbers();
    else if (type === 'grid') drawGrid();
  }

  // Apply to body/wrap background
  const colors = {
    dark: '#0a0a0a',
    stone: '#1a1614',
    none: 'transparent',
    snow: '#0e0e16',
    grid: '#070712',
    ember: '#100500',
  };
  wrap.style.background = colors[type] || '#0a0a0a';
}

function resizeBg() {
  if (!bgCanvas) return;
  const wrap = document.getElementById('canvas-wrap');
  bgCanvas.width = wrap.clientWidth;
  bgCanvas.height = wrap.clientHeight;
  if (currentBg === 'grid') drawGrid();
}

function drawGrid() {
  if (!bgCtx) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  bgCtx.strokeStyle = 'rgba(80,140,255,0.08)';
  bgCtx.lineWidth = 0.5;
  const step = 40;
  for (let x = 0; x < w; x += step) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
  for (let y = 0; y < h; y += step) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }
}

function initSnow() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgParticles = Array.from({length:80}, () => ({
    x: Math.random()*w, y: Math.random()*h,
    r: Math.random()*2+0.5,
    speed: Math.random()*0.8+0.2,
    drift: (Math.random()-0.5)*0.3,
    opacity: Math.random()*0.5+0.2
  }));
}

function initEmbers() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgParticles = Array.from({length:60}, () => ({
    x: Math.random()*w, y: h + Math.random()*50,
    r: Math.random()*2+0.5,
    speed: Math.random()*1.5+0.5,
    drift: (Math.random()-0.5)*0.5,
    life: Math.random(),
    opacity: 0
  }));
}

function updateBgParticles() {
  if (!bgCanvas || !bgCtx || bgParticles.length === 0) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  if (currentBg === 'grid') { drawGrid(); return; }

  bgParticles.forEach(p => {
    if (currentBg === 'snow') {
      p.y += p.speed; p.x += p.drift;
      if (p.y > h) { p.y = -5; p.x = Math.random()*w; }
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(200,220,255,${p.opacity})`;
      bgCtx.fill();
    } else if (currentBg === 'ember') {
      p.y -= p.speed; p.x += p.drift; p.life += 0.01;
      p.opacity = Math.sin(p.life * Math.PI) * 0.7;
      if (p.y < -10 || p.life > 1) {
        p.y = h + 10; p.x = Math.random()*w; p.life = 0; p.opacity = 0;
        p.speed = Math.random()*1.5+0.5; p.drift = (Math.random()-0.5)*0.5;
      }
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(255,${100+Math.random()*100},0,${p.opacity})`;
      bgCtx.fill();
    }
  });
}

function setCustomBg(color) {
  document.getElementById('canvas-wrap').style.background = color;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initThree();
renderDiceSelectors();
updateModifierDisplay();
setBackground('dark');
renderSavedList();

// On first user interaction: unlock Web Audio.
// Also auto-enable shake on Android (no permission API needed).
// iOS users must tap the Shake button explicitly (permission requires its own gesture).
document.body.addEventListener('pointerdown', function firstTouch() {
  document.body.removeEventListener('pointerdown', firstTouch);
  try { getAudio().resume(); } catch(e) {}
  // Auto-enable shake for Android / non-iOS browsers silently
  const needsPermission = typeof DeviceMotionEvent !== 'undefined' &&
                          typeof DeviceMotionEvent.requestPermission === 'function';
  if (!needsPermission && typeof DeviceMotionEvent !== 'undefined') {
    enableShake();
  }
});
</script>
