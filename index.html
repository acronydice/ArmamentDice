<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ArmamentDice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,140,0,0.2);
    --border-bright: rgba(255,140,0,0.5);
    --gold: #e8a020;
    --gold-bright: #ffcc55;
    --ember: #ff5a00;
    --ember-dark: #c03800;
    --text: #f0e8d8;
    --text-muted: #9a8870;
    --danger: #ff3333;
    --radius: 8px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
    gap: 6px;
  }
  .tb-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .tb-btn:hover { background: rgba(255,140,0,0.12); border-color: var(--border-bright); color: var(--gold); }
  .tb-btn svg { flex-shrink: 0; }
  #topbar-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.08em;
    flex: 1;
    text-align: center;
  }

  /* CANVAS */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  /* bg canvas sits at z=0, dice canvas at z=2, result overlay at z=3 */
  #diceCanvas {
    display: block; width: 100%; height: 100%;
    position: absolute; inset: 0;
    z-index: 2;
    background: transparent;
  }

  /* RESULT OVERLAY */
  #result-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    gap: 8px;
    z-index: 3;
  }
  #result-overlay.show { opacity: 1; }
  #result-total {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(48px, 12vw, 96px);
    font-weight: 700;
    color: var(--gold-bright);
    text-shadow: 0 0 40px rgba(255,180,0,0.8), 0 0 80px rgba(255,100,0,0.4);
    line-height: 1;
  }
  #result-breakdown {
    font-family: 'EB Garamond', serif;
    font-size: clamp(12px, 3vw, 18px);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  #result-modifier-display {
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 3.5vw, 22px);
    color: var(--ember);
  }

  /* BOTTOM PANEL */
  #bottom-panel {
    background: rgba(0,0,0,0.85);
    border-top: 1px solid var(--border);
    padding: 8px 8px 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  /* DICE SELECTORS */
  #dice-selectors {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    width: 100%;
  }

  .die-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .die-card:hover { border-color: var(--border-bright); }
  .die-card.selected { background: rgba(255,140,0,0.1); border-color: var(--gold); }
  .die-card .die-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .die-card .die-icon svg { width: 28px; height: 28px; }
  .die-card .die-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  .die-card .die-stepper {
    display: flex;
    align-items: center;
    gap: 2px;
    width: 100%;
    justify-content: center;
  }
  .step-btn {
    width: 18px; height: 18px;
    background: rgba(255,140,0,0.12);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--gold);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: monospace;
    padding: 0;
    flex-shrink: 0;
  }
  .step-btn:hover { background: rgba(255,140,0,0.25); border-color: var(--gold); }
  .step-val {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--text);
    min-width: 14px;
    text-align: center;
  }

  /* ROLL/RESET BUTTONS */
  #action-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  #roll-btn {
    flex: 1;
    background: linear-gradient(135deg, #c84000, #e87000);
    border: 1px solid #ff8822;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(200,80,0,0.3);
  }
  #roll-btn:hover { background: linear-gradient(135deg, #e05000, #ff8800); box-shadow: 0 0 30px rgba(255,120,0,0.5); }
  #roll-btn:active { transform: scale(0.97); }
  #roll-btn.rolling { animation: rollPulse 0.6s infinite alternate; }
  @keyframes rollPulse {
    from { box-shadow: 0 0 20px rgba(255,120,0,0.4); }
    to { box-shadow: 0 0 40px rgba(255,200,0,0.7); }
  }
  #reset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #reset-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,50,50,0.08); }

  /* MODIFIER DISPLAY */
  #modifier-chip {
    background: rgba(255,140,0,0.1);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #modifier-chip:hover { border-color: var(--gold); background: rgba(255,140,0,0.18); }

  /* SHAKE HINT */
  #shake-hint {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    color: rgba(255,140,0,0.3);
    pointer-events: none;
    letter-spacing: 0.08em;
    white-space: nowrap;
    z-index: 4;
  }

  /* PANEL OVERLAY */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .panel-overlay.open { opacity: 1; pointer-events: all; }
  .panel-sheet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 85dvh;
    overflow-y: auto;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  .panel-overlay.open .panel-sheet { transform: translateY(0); }
  .panel-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 0.06em;
  }
  .panel-close {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .panel-close:hover { color: var(--text); }

  /* SETTINGS SECTIONS */
  .setting-section {
    margin-bottom: 24px;
  }
  .setting-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .option-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .opt-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    padding: 8px 14px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .opt-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .opt-btn.active { background: rgba(255,140,0,0.15); border-color: var(--gold); color: var(--gold-bright); }
  .color-picker-row { display: flex; align-items: center; gap: 12px; }
  input[type="color"] {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    padding: 2px;
    background: var(--surface2);
  }

  /* MODIFIER INPUT */
  .modifier-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .mod-btn {
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
    transition: all 0.15s;
  }
  .mod-btn:hover { background: rgba(255,140,0,0.15); border-color: var(--gold); }
  #mod-value {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--text);
    min-width: 50px;
    text-align: center;
  }
  .input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    width: 100%;
    outline: none;
    margin-bottom: 8px;
  }
  .input-field:focus { border-color: var(--gold); }

  /* HISTORY LIST */
  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .hist-total {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold-bright);
    flex-shrink: 0;
  }
  .hist-detail {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }
  .hist-time {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  /* SAVED CONFIGS */
  .saved-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .saved-card:hover { border-color: var(--border-bright); background: rgba(255,140,0,0.05); }
  .saved-card-title { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); margin-bottom: 4px; }
  .saved-card-detail { font-family: 'EB Garamond', serif; font-size: 12px; color: var(--text-muted); }
  .saved-delete {
    float: right;
    background: none; border: none; color: rgba(255,80,80,0.4); font-size: 16px; cursor: pointer;
    padding: 0; transition: color 0.2s;
  }
  .saved-delete:hover { color: var(--danger); }

  /* ADV/DIS buttons in topbar */
  .adv-btn {
    background: rgba(0,200,100,0.08);
    border: 1px solid rgba(0,200,100,0.2);
    color: rgba(0,220,100,0.7);
  }
  .adv-btn.active { background: rgba(0,200,100,0.2); border-color: rgba(0,255,120,0.6); color: #00ff88; }
  .dis-btn {
    background: rgba(200,50,50,0.08);
    border: 1px solid rgba(200,50,50,0.2);
    color: rgba(220,80,80,0.7);
  }
  .dis-btn.active { background: rgba(200,50,50,0.2); border-color: rgba(255,80,80,0.6); color: #ff5555; }

  /* Responsive */
  @media (min-width: 600px) {
    .die-card { min-width: 80px; }
    .panel-sheet { border-radius: 20px 20px 0 0; }
  }

  /* SVG die icons */
  .die-svg { fill: none; stroke: currentColor; stroke-width: 1.5; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button class="tb-btn" onclick="openPanel('menu')">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="4" width="12" height="1.5" rx="0.75"/><rect x="2" y="7.25" width="12" height="1.5" rx="0.75"/><rect x="2" y="10.5" width="12" height="1.5" rx="0.75"/></svg>
    Menu
  </button>
  <button class="tb-btn adv-btn" id="adv-btn" onclick="toggleAdv()">ADV</button>
  <div id="topbar-title">ArmamentDice</div>
  <button class="tb-btn dis-btn" id="dis-btn" onclick="toggleDis()">DIS</button>
  <button class="tb-btn" id="shake-btn" onclick="requestMotionPermission()" title="Enable shake to roll">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg>
    Shake
  </button>
  <button class="tb-btn" onclick="openPanel('history')">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5.5"/><polyline points="7,4 7,7 9,9"/></svg>
    Log
  </button>
</div>

<!-- 3D CANVAS -->
<div id="canvas-wrap">
  <canvas id="diceCanvas"></canvas>
  <div id="result-overlay">
    <div id="result-total">—</div>
    <div id="result-breakdown"></div>
    <div id="result-modifier-display"></div>
  </div>
  <div id="shake-hint">shake to roll • tap to roll</div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
  <div id="dice-selectors">
    <!-- filled by JS -->
  </div>
  <div id="action-row">
    <button id="modifier-chip" onclick="openPanel('modifier')">MOD: +0</button>
    <button id="roll-btn" onclick="initiateRoll()">⚔ ROLL THE DICE</button>
    <button id="reset-btn" onclick="resetAll()">✕</button>
  </div>
</div>

<!-- MENU PANEL -->
<div class="panel-overlay" id="panel-menu" onclick="closePanelOnOverlay(event,'panel-menu')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('menu')">✕</button>
    <div class="panel-title">Settings</div>

    <div class="setting-section">
      <div class="setting-label">Dice Skin</div>
      <div class="option-grid" id="skin-options"></div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Background</div>
      <div class="option-grid" id="bg-options"></div>
      <div class="color-picker-row" style="margin-top:10px">
        <span style="font-size:13px;color:var(--text-muted)">Custom BG color:</span>
        <input type="color" id="bg-color-picker" value="#0a0a0a" oninput="setCustomBg(this.value)">
      </div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Roll Sound</div>
      <div class="option-grid" id="sound-options"></div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Roll Speed</div>
      <div class="option-grid" id="speed-options"></div>
    </div>

    <div class="setting-section">
      <div class="setting-label">Saved Configurations</div>
      <button class="opt-btn" style="width:100%;margin-bottom:12px" onclick="openPanel('save')">+ Save Current Config</button>
      <div id="saved-list"></div>
    </div>
  </div>
</div>

<!-- MODIFIER PANEL -->
<div class="panel-overlay" id="panel-modifier" onclick="closePanelOnOverlay(event,'panel-modifier')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('modifier')">✕</button>
    <div class="panel-title">Roll Modifier</div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">Add a flat bonus or penalty to the total roll.</p>
    <div class="modifier-row" style="justify-content:center">
      <button class="mod-btn" onclick="changeModifier(-5)">−5</button>
      <button class="mod-btn" onclick="changeModifier(-1)">−</button>
      <div id="mod-value">+0</div>
      <button class="mod-btn" onclick="changeModifier(1)">+</button>
      <button class="mod-btn" onclick="changeModifier(5)">+5</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="opt-btn" onclick="setModifier(0)">Reset to 0</button>
    </div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel-overlay" id="panel-history" onclick="closePanelOnOverlay(event,'panel-history')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('history')">✕</button>
    <div class="panel-title">Roll History</div>
    <button class="opt-btn" style="margin-bottom:14px" onclick="clearHistory()">Clear History</button>
    <div id="history-list"><p style="color:var(--text-muted);font-size:14px">No rolls yet.</p></div>
  </div>
</div>

<!-- SAVE PANEL -->
<div class="panel-overlay" id="panel-save" onclick="closePanelOnOverlay(event,'panel-save')">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closePanel('save')">✕</button>
    <div class="panel-title">Save Configuration</div>
    <input class="input-field" id="save-name" placeholder="Configuration name (e.g. Attack Roll)">
    <button class="opt-btn active" style="width:100%" onclick="saveCurrentConfig()">Save</button>
  </div>
</div>

<!-- Three.js + Cannon.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const DICE_TYPES = ['D4','D6','D8','D10','D12','D20'];
const DICE_SIDES = {D4:4,D6:6,D8:8,D10:10,D12:12,D20:20};
let diceConfig = {D4:0,D6:0,D8:0,D10:0,D12:0,D20:0};
let modifier = 0;
let advantage = false;
let disadvantage = false;
let rollHistory = [];
let savedConfigs = JSON.parse(localStorage.getItem('fof_saved') || '[]');
let rollHistory_store = JSON.parse(localStorage.getItem('fof_history') || '[]');
rollHistory = rollHistory_store;

const SKINS = [
  {id:'lava',    name:'Lava',    color1:'#ff4400', color2:'#cc2200', emissive:'#882200'},
  {id:'ice',     name:'Ice',     color1:'#88ccff', color2:'#4499dd', emissive:'#114488'},
  {id:'void',    name:'Void',    color1:'#220044', color2:'#440088', emissive:'#330055'},
  {id:'gold',    name:'Gold',    color1:'#ffcc44', color2:'#cc8822', emissive:'#884400'},
  {id:'forest',  name:'Forest',  color1:'#224422', color2:'#336633', emissive:'#112211'},
  {id:'bone',    name:'Bone',    color1:'#e8dcc8', color2:'#c8b898', emissive:'#887766'},
  {id:'blood',   name:'Blood',   color1:'#880011', color2:'#660009', emissive:'#440006'},
  {id:'sky',     name:'Sky',     color1:'#6699ff', color2:'#4477dd', emissive:'#224488'},
];
const BG_OPTIONS = [
  {id:'dark',   name:'Dark',     fn: () => setBackground('dark')},
  {id:'stone',  name:'Stone',    fn: () => setBackground('stone')},
  {id:'snow',   name:'Snow',     fn: () => setBackground('snow')},
  {id:'grid',   name:'Grid',     fn: () => setBackground('grid')},
  {id:'ember',  name:'Embers',   fn: () => setBackground('ember')},
  {id:'none',   name:'None',     fn: () => setBackground('none')},
];
const SOUNDS = [
  {id:'default', name:'Dice Clatter'},
  {id:'thunder', name:'Thunder'},
  {id:'sword',   name:'Sword'},
  {id:'explosion', name:'Explosion'},
  {id:'fireball', name:'Fireball'},
  {id:'magic',   name:'Magic'},
  {id:'ice',     name:'Ice Crystal'},
];

let currentSkin = 'lava';
let currentBg = 'dark';
let currentSound = 'default';
let rollSpeed = 1.0; // 0.5=slow, 1.0=normal, 2.0=fast
let bgAnimFrame = null;
let bgCanvas = null;
let bgCtx = null;
let bgParticles = [];

// ─── AUDIO ───────────────────────────────────────────────────────────────────
// Loads sound files from ./sounds/<id>.mp3 (falls back to .ogg then .wav)
// Required files: default.mp3, thunder.mp3, sword.mp3, explosion.mp3,
//                 fireball.mp3, magic.mp3, ice.mp3
const SOUND_EXTENSIONS = ['mp3', 'ogg', 'wav'];
const soundCache = {};

function getAudio() {
  if (!window._audioCtx) {
    try { window._audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return window._audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudio();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  } catch(e) {}

  // If already cached, rewind and play
  if (soundCache[type]) {
    try { soundCache[type].currentTime = 0; soundCache[type].play().catch(() => {}); } catch(e) {}
    return;
  }

  // Build Audio element, try extensions in order until one loads
  const audio = new Audio();
  audio.volume = 0.7;
  audio.preload = 'auto';
  let extIdx = 0;

  function tryNext() {
    if (extIdx >= SOUND_EXTENSIONS.length) return; // no working file found — silent
    audio.src = `./sounds/${type}.${SOUND_EXTENSIONS[extIdx++]}`;
    audio.load();
  }

  audio.addEventListener('error', tryNext);
  audio.addEventListener('canplaythrough', () => {
    soundCache[type] = audio;
    audio.play().catch(() => {});
  }, { once: true });

  tryNext();
}

// ─── THREE.JS SCENE ──────────────────────────────────────────────────────────
let renderer, scene, camera, world;
let diceMeshes = [];
let diceBodies = [];
let animating = false;
let rollDone = false;

function initThree() {
  const canvas = document.getElementById('diceCanvas');
  const wrap = document.getElementById('canvas-wrap');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0); // fully transparent — bg canvas shows through
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
  camera.position.set(0, 8, 10);
  camera.lookAt(0, 0, 0);

  // Lighting
  const ambient = new THREE.AmbientLight(0x331100, 1.5);
  scene.add(ambient);
  const spot = new THREE.SpotLight(0xff8833, 3, 30, Math.PI/4, 0.5);
  spot.position.set(0, 12, 0);
  spot.castShadow = true;
  spot.shadow.mapSize.width = 1024;
  spot.shadow.mapSize.height = 1024;
  scene.add(spot);
  const fill = new THREE.DirectionalLight(0xff5500, 0.8);
  fill.position.set(-5, 5, -3);
  scene.add(fill);

  // Ground plane (invisible)
  const groundGeo = new THREE.PlaneGeometry(50, 50);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1;
  ground.receiveShadow = true;
  scene.add(ground);

  // Physics world
  world = new CANNON.World();
  world.gravity.set(0, -20, 0);
  world.broadphase = new CANNON.NaiveBroadphase();
  world.solver.iterations = 10;

  // Ground body
  const groundBody = new CANNON.Body({ mass: 0 });
  groundBody.addShape(new CANNON.Plane());
  groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
  groundBody.position.y = -1;
  world.addBody(groundBody);

  // Ceiling — stops dice from flying out the top
  const ceilBody = new CANNON.Body({ mass: 0 });
  ceilBody.addShape(new CANNON.Plane());
  ceilBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), Math.PI/2);
  ceilBody.position.y = 12;
  world.addBody(ceilBody);

  // Walls are built after first resize so they match the visible frustum
  resizeRenderer();
  rebuildWalls();
  window.addEventListener('resize', () => { resizeRenderer(); rebuildWalls(); });
  renderer.setAnimationLoop(renderLoop);
}

// Track wall bodies so we can remove and rebuild them on resize
let wallBodies = [];

function getGroundBounds() {
  // Compute the half-extents of the visible ground plane (y=-1) from the camera frustum.
  // Camera sits at (0, camY, camZ) looking at origin with given FOV and aspect.
  const camY = camera.position.y;
  const camZ = camera.position.z;
  const fovRad = (camera.fov * Math.PI) / 180;
  const aspect = camera.aspect || 1;
  const groundY = -1;

  // Ray from camera through bottom edge of screen hits ground at z = groundZ_far
  // Ray from camera through top edge hits ground at z = groundZ_near (in front of camera)
  // We use a conservative bound: the distance from camera to ground along the view axis.
  // Simpler: cast four corner rays and find XZ extents at y=groundY.

  const halfH = Math.tan(fovRad / 2);
  const halfW = halfH * aspect;

  // Camera looks toward -Z (at origin). Build view directions for 4 corners.
  const camPos = camera.position.clone();
  const target = new THREE.Vector3(0, 0, 0);
  // forward, right, up in camera space
  const forward = target.clone().sub(camPos).normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();
  const up = new THREE.Vector3().crossVectors(right, forward).normalize();

  const corners = [
    forward.clone().addScaledVector(right,  halfW).addScaledVector(up,  halfH),
    forward.clone().addScaledVector(right, -halfW).addScaledVector(up,  halfH),
    forward.clone().addScaledVector(right,  halfW).addScaledVector(up, -halfH),
    forward.clone().addScaledVector(right, -halfW).addScaledVector(up, -halfH),
  ];

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  corners.forEach(dir => {
    if (Math.abs(dir.y) < 0.0001) return;
    const t = (groundY - camPos.y) / dir.y;
    if (t <= 0) return; // behind camera
    const hx = camPos.x + dir.x * t;
    const hz = camPos.z + dir.z * t;
    minX = Math.min(minX, hx); maxX = Math.max(maxX, hx);
    minZ = Math.min(minZ, hz); maxZ = Math.max(maxZ, hz);
  });

  // Clamp to reasonable max in case rays are near-parallel to ground
  const LIMIT = 20;
  minX = Math.max(minX, -LIMIT); maxX = Math.min(maxX, LIMIT);
  minZ = Math.max(minZ, -LIMIT); maxZ = Math.min(maxZ, LIMIT);

  return { minX, maxX, minZ, maxZ,
    cx: (minX + maxX) / 2, cz: (minZ + maxZ) / 2,
    halfX: (maxX - minX) / 2, halfZ: (maxZ - minZ) / 2 };
}

function rebuildWalls() {
  // Remove old walls
  wallBodies.forEach(b => world.remove(b));
  wallBodies = [];

  const b = getGroundBounds();
  const wallH = 15; // tall enough to catch any die

  // Each wall: [position, rotation axis, rotation angle]
  const wallDefs = [
    // Left  (-X)
    { pos: [b.minX, wallH/2 - 1, b.cz], axis: [0,1,0], angle:  Math.PI/2 },
    // Right (+X)
    { pos: [b.maxX, wallH/2 - 1, b.cz], axis: [0,1,0], angle: -Math.PI/2 },
    // Near  (+Z — toward camera)
    { pos: [b.cx, wallH/2 - 1, b.maxZ], axis: [1,0,0], angle:  Math.PI },
    // Far   (-Z — away from camera)
    { pos: [b.cx, wallH/2 - 1, b.minZ], axis: [1,0,0], angle:  0 },
  ];

  wallDefs.forEach(({ pos, axis, angle }) => {
    const body = new CANNON.Body({ mass: 0, restitution: 0.3 });
    body.addShape(new CANNON.Plane());
    body.position.set(...pos);
    body.quaternion.setFromAxisAngle(new CANNON.Vec3(...axis), angle);
    world.addBody(body);
    wallBodies.push(body);
  });
}

function resizeRenderer() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

let lastTime = 0;
function renderLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  skinAnimTime += dt;

  // Update animated skin textures (lava, void, sky)
  const animatedSkins = ['lava', 'void', 'sky'];
  if (animatedSkins.includes(currentSkin) && skinTextureCanvases[currentSkin]) {
    skinTextureCanvases[currentSkin].update(skinAnimTime);
  }

  if (animating) {
    // Scale physics timestep by rollSpeed so dice roll faster/slower
    const physDt = Math.min(dt * rollSpeed, 0.05);
    world.step(1/60, physDt, 3);
    diceMeshes.forEach((mesh, i) => {
      if (!diceBodies[i]) return;
      mesh.position.copy(diceBodies[i].position);
      mesh.quaternion.copy(diceBodies[i].quaternion);
    });

    // Check if dice settled — settle window also scales with speed
    const minRollMs = 1500 / rollSpeed;
    const maxRollMs = 4500 / rollSpeed;
    if (time > rollStartTime + minRollMs) {
      const allStopped = diceBodies.every(b =>
        b.velocity.length() < 0.3 && b.angularVelocity.length() < 0.3
      );
      if (allStopped || time > rollStartTime + maxRollMs) {
        animating = false;
        showResults();
      }
    }
  }

  updateBgParticles();
  renderer.render(scene, camera);
}

// ─── DICE GEOMETRY ───────────────────────────────────────────────────────────

// Build a pentagonal trapezohedron (true D10 shape):
// 10 kite faces, 5-fold symmetry, two polar apexes, zig-zag equatorial band.
function buildD10Geometry(radius) {
  radius = radius || 0.75;
  const geo = new THREE.BufferGeometry();
  const verts = [], indices = [];

  // Two polar apexes
  const TOP    =  radius;         // top apex y
  const BOTTOM = -radius;         // bottom apex y

  // 5 upper belt vertices  (slightly above equator, rotated 0°, 72°, 144°, ...)
  // 5 lower belt vertices  (slightly below equator, rotated 36°, 108°, ...)
  const uR = radius * 0.72;   // radial distance of upper ring
  const uY = radius * 0.18;   // height of upper ring
  const lR = radius * 0.72;
  const lY = -radius * 0.18;

  // Vertex 0: top apex
  verts.push(0, TOP, 0);
  // Vertices 1-5: upper ring
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    verts.push(uR * Math.cos(a), uY, uR * Math.sin(a));
  }
  // Vertices 6-10: lower ring (offset by 36°)
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + Math.PI / 5;
    verts.push(lR * Math.cos(a), lY, lR * Math.sin(a));
  }
  // Vertex 11: bottom apex
  verts.push(0, BOTTOM, 0);

  // 5 upper kite faces: top apex → upper[i] → lower[i] → upper[i+1]
  for (let i = 0; i < 5; i++) {
    const u0 = 1 + i;
    const u1 = 1 + (i + 1) % 5;
    const l0 = 6 + i;
    // kite: top, u0, l0, u1  (split into 2 triangles)
    indices.push(0, u0, l0);
    indices.push(0, l0, u1);
  }
  // 5 lower kite faces: bottom apex → lower[i] → upper[i+1] → lower[i+1]
  for (let i = 0; i < 5; i++) {
    const l0 = 6 + i;
    const l1 = 6 + (i + 1) % 5;
    const u1 = 1 + (i + 1) % 5;
    indices.push(11, l1, u1);
    indices.push(11, l0, l1);
  }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

function createDiceGeometry(type) {
  switch(type) {
    case 'D4':  return new THREE.TetrahedronGeometry(0.7);
    case 'D6':  return new THREE.BoxGeometry(0.9, 0.9, 0.9, 1, 1, 1);
    case 'D8':  return new THREE.OctahedronGeometry(0.75);
    case 'D10': return buildD10Geometry(0.8);
    case 'D12': return new THREE.DodecahedronGeometry(0.7);
    case 'D20': return new THREE.IcosahedronGeometry(0.75);
    default:    return new THREE.BoxGeometry(0.9,0.9,0.9);
  }
}

function createDicePhysicsShape(type) {
  switch(type) {
    case 'D6':  return new CANNON.Box(new CANNON.Vec3(0.45,0.45,0.45));
    default:    return new CANNON.Sphere(0.52);
  }
}

// ─── PROCEDURAL SKIN TEXTURES ────────────────────────────────────────────────
// Each skin gets a 256×256 canvas texture with animated or static detail.
// Animated skins (lava, void) update each frame via their canvas context.

const skinTextureCanvases = {}; // skinId → {canvas, ctx, texture, update}
let skinAnimTime = 0; // incremented in render loop

function buildSkinTexture(skinId) {
  if (skinTextureCanvases[skinId]) return skinTextureCanvases[skinId];
  const SIZE = 256;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;

  let entry = { canvas, ctx, texture, update: null };

  if (skinId === 'lava') {
    // Animated lava: turbulent orange/red blobs that shift over time
    entry.update = (t) => {
      const id = ctx.createImageData(SIZE, SIZE);
      const d = id.data;
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const nx = x / SIZE, ny = y / SIZE;
          // layered sine noise for organic look
          const v = (
            Math.sin((nx * 6 + t * 0.8)) +
            Math.sin((ny * 6 - t * 0.6)) +
            Math.sin((nx * 4 + ny * 4 + t)) +
            Math.sin(Math.sqrt((nx-0.5)**2 + (ny-0.5)**2) * 10 - t * 1.2)
          ) * 0.25 + 0.5; // 0..1
          const hot = Math.pow(v, 1.4);
          const idx = (y * SIZE + x) * 4;
          d[idx]   = Math.min(255, hot * 255);                  // R
          d[idx+1] = Math.min(255, Math.max(0, (hot-0.4)*180)); // G
          d[idx+2] = 0;                                          // B
          d[idx+3] = 255;
        }
      }
      ctx.putImageData(id, 0, 0);
      // Bright cracks overlay
      ctx.strokeStyle = 'rgba(255,220,80,0.35)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const ox = (Math.sin(i * 1.3 + t * 0.3) * 0.5 + 0.5) * SIZE;
        const oy = (Math.cos(i * 1.7 + t * 0.2) * 0.5 + 0.5) * SIZE;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox + Math.sin(t+i)*30, oy + Math.cos(t+i)*30);
        ctx.stroke();
      }
      texture.needsUpdate = true;
    };

  } else if (skinId === 'ice') {
    // Frost: static icy blue-white with crystalline crack lines
    ctx.fillStyle = '#c8e8ff';
    ctx.fillRect(0, 0, SIZE, SIZE);
    // Gradient depth
    const grad = ctx.createRadialGradient(SIZE/2,SIZE/2,10, SIZE/2,SIZE/2,SIZE*0.7);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.5, 'rgba(180,220,255,0.6)');
    grad.addColorStop(1, 'rgba(80,140,200,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,SIZE,SIZE);
    // Frost crystal lines
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 0.8;
    const rng = (s) => { let x = Math.sin(s)*10000; return x - Math.floor(x); };
    for (let i = 0; i < 20; i++) {
      const sx = rng(i*3.1)*SIZE, sy = rng(i*7.4)*SIZE;
      ctx.beginPath(); ctx.moveTo(sx, sy);
      for (let b = 0; b < 4; b++) {
        const angle = rng(i+b*0.9) * Math.PI * 2;
        const len = rng(i*2+b) * 40 + 15;
        ctx.lineTo(sx + Math.cos(angle)*len, sy + Math.sin(angle)*len);
        ctx.moveTo(sx, sy);
      }
      ctx.stroke();
    }
    // White sparkle dots
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (let i = 0; i < 30; i++) {
      ctx.beginPath();
      ctx.arc(rng(i*5.3)*SIZE, rng(i*8.1)*SIZE, rng(i*2.2)*2+0.5, 0, Math.PI*2);
      ctx.fill();
    }
    texture.needsUpdate = true;

  } else if (skinId === 'void') {
    // Animated void: dark swirling purple with a glowing slit-pupil eye in center
    entry.update = (t) => {
      const id = ctx.createImageData(SIZE, SIZE);
      const d = id.data;
      const cx2 = SIZE/2, cy2 = SIZE/2;
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const dx = (x - cx2) / (SIZE/2), dy = (y - cy2) / (SIZE/2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          const angle = Math.atan2(dy, dx);
          // Swirl: rotate angle by distance
          const swirl = angle + dist * 2.5 - t * 0.4;
          const v = (Math.sin(swirl * 3) * 0.5 + 0.5) * (1 - Math.min(dist, 1) * 0.6);
          const idx = (y * SIZE + x) * 4;
          d[idx]   = Math.floor(v * 80);
          d[idx+1] = Math.floor(v * 20);
          d[idx+2] = Math.floor(v * 140 + 40);
          d[idx+3] = 255;
        }
      }
      ctx.putImageData(id, 0, 0);

      // Glowing eye — iris
      const eyeR = SIZE * 0.22;
      const irisGrad = ctx.createRadialGradient(cx2,cy2, 0, cx2,cy2, eyeR);
      irisGrad.addColorStop(0, `rgba(180,0,255,${0.6 + Math.sin(t)*0.15})`);
      irisGrad.addColorStop(0.5, `rgba(100,0,200,0.7)`);
      irisGrad.addColorStop(1, 'rgba(20,0,60,0.9)');
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, eyeR, eyeR * 0.65, 0, 0, Math.PI*2);
      ctx.fillStyle = irisGrad;
      ctx.fill();

      // Glow halo
      const glowGrad = ctx.createRadialGradient(cx2,cy2, eyeR*0.8, cx2,cy2, eyeR*1.6);
      glowGrad.addColorStop(0, `rgba(160,0,255,${0.25 + Math.sin(t*1.3)*0.1})`);
      glowGrad.addColorStop(1, 'rgba(80,0,180,0)');
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, eyeR*1.6, eyeR*1.1, 0, 0, Math.PI*2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      // Slit pupil — vertical ellipse that pulses slightly
      const pupilH = eyeR * (0.8 + Math.sin(t*0.7) * 0.08);
      const pupilW = eyeR * 0.18;
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, pupilW, pupilH, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.95)';
      ctx.fill();

      // Inner pupil sheen
      ctx.beginPath();
      ctx.ellipse(cx2 - pupilW*0.25, cy2 - pupilH*0.25, pupilW*0.25, pupilH*0.25, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,100,255,0.4)';
      ctx.fill();

      texture.needsUpdate = true;
    };

  } else if (skinId === 'gold') {
    // Hammered gold: warm gradient with radial sheen rings
    const grad = ctx.createRadialGradient(SIZE*0.35, SIZE*0.3, 5, SIZE/2, SIZE/2, SIZE*0.65);
    grad.addColorStop(0, '#fff5a0');
    grad.addColorStop(0.3, '#f0c030');
    grad.addColorStop(0.7, '#c88010');
    grad.addColorStop(1, '#805000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SIZE, SIZE);
    // Hammered texture: small circles
    for (let i = 0; i < 60; i++) {
      const rng = (s) => { let x = Math.sin(s*127.1)*43758.5; return x - Math.floor(x); };
      const hx = rng(i*3.7)*SIZE, hy = rng(i*5.3)*SIZE, hr = rng(i*2.1)*8+3;
      const hg = ctx.createRadialGradient(hx-hr*0.3, hy-hr*0.3, 0, hx, hy, hr);
      hg.addColorStop(0, 'rgba(255,240,150,0.3)');
      hg.addColorStop(1, 'rgba(100,60,0,0.2)');
      ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2);
      ctx.fillStyle = hg; ctx.fill();
    }
    texture.needsUpdate = true;

  } else if (skinId === 'forest') {
    // Mossy bark: green-brown with noise texture
    ctx.fillStyle = '#2a3a1a';
    ctx.fillRect(0,0,SIZE,SIZE);
    const id2 = ctx.createImageData(SIZE, SIZE);
    const d2 = id2.data;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const v = (Math.sin(x*0.3)*Math.cos(y*0.25) + Math.sin(x*0.07+y*0.11)*2) * 0.25 + 0.5;
        const i2 = (y*SIZE+x)*4;
        d2[i2]   = Math.floor(30 + v*40);
        d2[i2+1] = Math.floor(50 + v*80);
        d2[i2+2] = Math.floor(10 + v*20);
        d2[i2+3] = 255;
      }
    }
    ctx.putImageData(id2, 0, 0);
    // Moss highlight streaks
    ctx.strokeStyle = 'rgba(100,200,60,0.25)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 12; i++) {
      const rng = (s) => { let x = Math.sin(s)*10000; return x - Math.floor(x); };
      ctx.beginPath();
      ctx.moveTo(rng(i*3)*SIZE, rng(i*7)*SIZE);
      ctx.bezierCurveTo(rng(i+1)*SIZE, rng(i+2)*SIZE, rng(i+3)*SIZE, rng(i+4)*SIZE, rng(i+5)*SIZE, rng(i+6)*SIZE);
      ctx.stroke();
    }
    texture.needsUpdate = true;

  } else if (skinId === 'bone') {
    // Aged bone: off-white with vein cracks and yellowing
    const bg2 = ctx.createLinearGradient(0,0,SIZE,SIZE);
    bg2.addColorStop(0,'#f0e8d0'); bg2.addColorStop(1,'#c8b890');
    ctx.fillStyle = bg2; ctx.fillRect(0,0,SIZE,SIZE);
    ctx.strokeStyle = 'rgba(140,110,70,0.35)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 18; i++) {
      const rng = (s) => { let x = Math.sin(s*127.1)*43758.5; return x - Math.floor(x); };
      ctx.beginPath();
      ctx.moveTo(rng(i*4.1)*SIZE, rng(i*6.3)*SIZE);
      ctx.quadraticCurveTo(rng(i*2)*SIZE, rng(i*3)*SIZE, rng(i*5)*SIZE, rng(i*7)*SIZE);
      ctx.stroke();
    }
    // Yellowing spots
    for (let i = 0; i < 15; i++) {
      const rng = (s) => { let x = Math.sin(s*127.1)*43758.5; return x - Math.floor(x); };
      const sg = ctx.createRadialGradient(rng(i*3.3)*SIZE, rng(i*4.4)*SIZE, 0, rng(i*3.3)*SIZE, rng(i*4.4)*SIZE, 20);
      sg.addColorStop(0,'rgba(180,140,60,0.25)'); sg.addColorStop(1,'rgba(180,140,60,0)');
      ctx.beginPath(); ctx.arc(rng(i*3.3)*SIZE, rng(i*4.4)*SIZE, 20, 0, Math.PI*2);
      ctx.fillStyle = sg; ctx.fill();
    }
    texture.needsUpdate = true;

  } else if (skinId === 'blood') {
    // Dark crimson with wet sheen drips
    ctx.fillStyle = '#220004'; ctx.fillRect(0,0,SIZE,SIZE);
    const id3 = ctx.createImageData(SIZE, SIZE);
    const d3 = id3.data;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const v = (Math.sin(x*0.15)*Math.sin(y*0.12) + Math.sin((x+y)*0.09)) * 0.3 + 0.5;
        const i3 = (y*SIZE+x)*4;
        d3[i3]   = Math.floor(80 + v*100);
        d3[i3+1] = 0; d3[i3+2] = Math.floor(v*15); d3[i3+3] = 255;
      }
    }
    ctx.putImageData(id3,0,0);
    // Wet highlight streaks
    ctx.strokeStyle = 'rgba(255,80,80,0.2)';
    ctx.lineWidth = 3;
    for (let i = 0; i < 5; i++) {
      const rng = (s) => { let x = Math.sin(s)*10000; return x-Math.floor(x); };
      ctx.beginPath();
      ctx.moveTo(rng(i*2.1)*SIZE, 0);
      ctx.lineTo(rng(i*2.1)*SIZE + (rng(i)-0.5)*40, SIZE);
      ctx.stroke();
    }
    texture.needsUpdate = true;

  } else if (skinId === 'sky') {
    // Animated celestial: deep blue with drifting star-motes
    entry.update = (t) => {
      const id4 = ctx.createImageData(SIZE, SIZE);
      const d4 = id4.data;
      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          const nx = x/SIZE, ny = y/SIZE;
          const v = (Math.sin(nx*4+t*0.3)*Math.cos(ny*4-t*0.2) + Math.sin((nx+ny)*5+t*0.5)) * 0.25 + 0.5;
          const i4 = (y*SIZE+x)*4;
          d4[i4]   = Math.floor(20 + v*60);
          d4[i4+1] = Math.floor(40 + v*80);
          d4[i4+2] = Math.floor(100 + v*155);
          d4[i4+3] = 255;
        }
      }
      ctx.putImageData(id4,0,0);
      // Twinkling stars
      for (let i = 0; i < 25; i++) {
        const rng = (s) => { let x = Math.sin(s*127.1)*43758.5; return x-Math.floor(x); };
        const sx = rng(i*3.3)*SIZE, sy = rng(i*7.1)*SIZE;
        const brightness = 0.4 + Math.sin(t*2 + i*1.3)*0.4;
        ctx.beginPath();
        ctx.arc(sx, sy, rng(i*2.2)*2+0.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,220,255,${brightness})`;
        ctx.fill();
      }
      texture.needsUpdate = true;
    };
  }

  // For static skins, do an immediate draw so texture is ready
  if (!entry.update) {
    entry.update = () => {}; // no-op for static
  }

  skinTextureCanvases[skinId] = entry;
  return entry;
}

function getSkinMaterial(skinId) {
  const skin = SKINS.find(s => s.id === skinId) || SKINS[0];
  const entry = buildSkinTexture(skinId);

  const mat = new THREE.MeshStandardMaterial({
    map: entry.texture,
    color: new THREE.Color('#ffffff'),
    emissive: new THREE.Color(skin.emissive),
    emissiveIntensity: skinId === 'void' ? 0.8 : (skinId === 'lava' ? 0.6 : 0.3),
    roughness: skinId === 'bone' ? 0.9 : (skinId === 'gold' ? 0.15 : 0.4),
    metalness: skinId === 'gold' ? 0.7 : (skinId === 'ice' ? 0.1 : 0.05),
  });
  return mat;
}

// ─── ROLL LOGIC ──────────────────────────────────────────────────────────────
let rollStartTime = 0;
let currentResults = [];
let currentDiceRolled = {};

function buildDiceForRoll() {
  // Clear existing
  diceMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  diceBodies.forEach(b => world.remove(b));
  diceMeshes = []; diceBodies = [];
  currentResults = []; currentDiceRolled = {};

  const mat = getSkinMaterial(currentSkin);

  DICE_TYPES.forEach(type => {
    let count = diceConfig[type];
    if (advantage || disadvantage) {
      // For advantage/disadvantage, only apply if single die type with count 1
      if (Object.values(diceConfig).reduce((a,b)=>a+b,0) === 1 && count === 1) count = 2;
    }
    for (let i = 0; i < count; i++) {
      const geo = createDiceGeometry(type);
      const mesh = new THREE.Mesh(geo, mat.clone());
      mesh.castShadow = true;
      mesh.userData.type = type;
      mesh.userData.result = 0;
      scene.add(mesh);
      diceMeshes.push(mesh);

      // Physics body
      const body = new CANNON.Body({ mass: 1 });
      body.addShape(createDicePhysicsShape(type));
      body.linearDamping  = 0.25 / rollSpeed; // faster = less damping = more energetic
      body.angularDamping = 0.25 / rollSpeed;

      // Spawn within visible ground bounds (with inset so dice don't hug walls)
      const bounds = getGroundBounds();
      const inset = 0.8;
      const px = bounds.cx + (Math.random()-0.5) * (bounds.halfX - inset) * 2;
      const pz = bounds.cz + (Math.random()-0.5) * (bounds.halfZ - inset) * 2;
      const py = 3 + Math.random()*2;
      body.position.set(px, py, pz);

      // Initial velocity scaled by rollSpeed
      const vs = 6 * rollSpeed;
      body.velocity.set((Math.random()-0.5)*vs, -2*rollSpeed, (Math.random()-0.5)*vs);
      const ws = 18 * rollSpeed;
      body.angularVelocity.set((Math.random()-0.5)*ws, (Math.random()-0.5)*ws, (Math.random()-0.5)*ws);

      // Random initial rotation
      body.quaternion.setFromEuler(Math.random()*Math.PI*2, Math.random()*Math.PI*2, Math.random()*Math.PI*2);

      world.addBody(body);
      diceBodies.push(body);

      // Roll the result
      const sides = DICE_SIDES[type];
      const roll = Math.floor(Math.random() * sides) + 1;
      mesh.userData.result = roll;
      currentDiceRolled[type] = (currentDiceRolled[type] || []);
      currentDiceRolled[type].push(roll);
    }
  });
}

let rollBtnElem = null;
function initiateRoll() {
  const total = Object.values(diceConfig).reduce((a,b)=>a+b,0);
  if (total === 0) { flashBtnError(); return; }

  try { getAudio().resume(); } catch(e){}
  playSound(currentSound);

  document.getElementById('result-overlay').classList.remove('show');

  // Use a generous padding so even high-flying dice don't escape view
  snapCameraToFit(diceMeshes, 2.2);
  // Also rebuild walls to match this wider camera view
  rebuildWalls();

  animating = true;
  rollStartTime = performance.now();

  const btn = document.getElementById('roll-btn');
  btn.textContent = '⚡ ROLLING...';
  btn.classList.add('rolling');
}

function showResults() {
  if (rollDone) return;
  rollDone = true;

  const btn = document.getElementById('roll-btn');
  btn.textContent = '⚔ ROLL THE DICE';
  btn.classList.remove('rolling');

  // Handle advantage/disadvantage
  let results = {};
  let breakdown = [];
  let rawTotal = 0;
  const singleDieType = Object.keys(currentDiceRolled).find(k => currentDiceRolled[k] && currentDiceRolled[k].length === 2);

  if ((advantage || disadvantage) && singleDieType && Object.keys(currentDiceRolled).length === 1) {
    const rolls = currentDiceRolled[singleDieType];
    const chosen = advantage ? Math.max(...rolls) : Math.min(...rolls);
    rawTotal = chosen;
    breakdown.push(`${singleDieType} [${rolls.join(',')}] → ${advantage?'ADV':'DIS'}: ${chosen}`);
  } else {
    DICE_TYPES.forEach(type => {
      if (!currentDiceRolled[type]) return;
      currentDiceRolled[type].forEach(r => {
        rawTotal += r;
        breakdown.push(`${type}: ${r}`);
      });
    });
  }

  const finalTotal = rawTotal + modifier;

  document.getElementById('result-total').textContent = finalTotal;
  document.getElementById('result-breakdown').textContent = breakdown.join(' · ');
  document.getElementById('result-modifier-display').textContent =
    modifier !== 0 ? `(${rawTotal} ${modifier >= 0 ? '+' : ''}${modifier} modifier)` : '';
  document.getElementById('result-overlay').classList.add('show');

  // Save to history
  const entry = {
    total: finalTotal,
    raw: rawTotal,
    modifier,
    breakdown: breakdown.join(' · '),
    config: Object.assign({}, diceConfig),
    skin: currentSkin,
    time: new Date().toLocaleTimeString()
  };
  rollHistory.unshift(entry);
  if (rollHistory.length > 50) rollHistory.pop();
  try { localStorage.setItem('fof_history', JSON.stringify(rollHistory)); } catch(e){}

  // Arrange dice in a neat grid then zoom camera in tightly to show results
  arrangeDiceGrid(() => tweenCameraToFit(diceMeshes, 1.35, 700));
}

// Arrange all settled dice into a tidy grid so nothing overlaps
function arrangeDiceGrid(onDone) {
  const n = diceMeshes.length;
  if (n === 0) { onDone && onDone(); return; }

  const SPACING = 1.5; // gap between die centres
  // Compute grid cols/rows to be as square as possible, favouring wider layouts
  const cols = Math.ceil(Math.sqrt(n * (camera.aspect || 1)));
  const rows = Math.ceil(n / cols);

  // Target positions centred on origin
  const targets = [];
  for (let i = 0; i < n; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const tx = (col - (cols - 1) / 2) * SPACING;
    const tz = (row - (rows - 1) / 2) * SPACING;
    targets.push({ x: tx, y: -1 + 0.55, z: tz }); // rest on the ground at y=-1, half-size up
  }

  // Animate mesh positions smoothly (physics done, just tween meshes)
  const dur = 500;
  const startTime = performance.now();
  const startPositions = diceMeshes.map(m => ({ x: m.position.x, y: m.position.y, z: m.position.z }));

  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function animStep(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const e = ease(t);
    diceMeshes.forEach((mesh, i) => {
      mesh.position.x = startPositions[i].x + (targets[i].x - startPositions[i].x) * e;
      mesh.position.y = startPositions[i].y + (targets[i].y - startPositions[i].y) * e;
      mesh.position.z = startPositions[i].z + (targets[i].z - startPositions[i].z) * e;
    });
    if (t < 1) {
      requestAnimationFrame(animStep);
    } else {
      onDone && onDone();
    }
  }
  requestAnimationFrame(animStep);
}

// (zoomToFitAll replaced by tweenCameraToFit / calcFitCamera above)

function resetCamera() {
  // Just zoom out to default overview when no dice present
  tweenCamera(0, 14, 14, 0, 0, 0, 600);
}

// Tween camera to a target position/lookat smoothly
function tweenCamera(tx, ty, tz, lx, ly, lz, dur) {
  const sx = camera.position.x, sy = camera.position.y, sz = camera.position.z;
  const startTime = performance.now();
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function step(now) {
    const t = Math.min((now - startTime) / dur, 1);
    const e = ease(t);
    camera.position.set(
      sx + (tx - sx) * e,
      sy + (ty - sy) * e,
      sz + (tz - sz) * e
    );
    camera.lookAt(lx, ly, lz);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Compute camera position that fits a bounding box of dice (by XZ extent at ground level)
// Returns {cx, cz, camY, camZ} — camera at (cx, camY, cz+camD) looking at (cx, -0.5, cz)
function calcFitCamera(diceMeshList, paddingFactor) {
  paddingFactor = paddingFactor || 1.4;
  const n = diceMeshList.length;
  if (n === 0) return { cx:0, cz:0, camY:14, camD:14 };

  let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
  diceMeshList.forEach(m => {
    minX = Math.min(minX, m.position.x - 0.6);
    maxX = Math.max(maxX, m.position.x + 0.6);
    minZ = Math.min(minZ, m.position.z - 0.6);
    maxZ = Math.max(maxZ, m.position.z + 0.6);
  });

  const cx = (minX + maxX) / 2;
  const cz = (minZ + maxZ) / 2;
  const extX = (maxX - minX) / 2 * paddingFactor;
  const extZ = (maxZ - minZ) / 2 * paddingFactor;

  const fovRad = (camera.fov * Math.PI) / 180;
  const aspect = camera.aspect || 1;
  const tanHalf = Math.tan(fovRad / 2);
  const distForZ = extZ / tanHalf;
  const distForX = extX / (aspect * tanHalf);
  const dist = Math.max(distForZ, distForX, 3.5);

  const angle = 42 * Math.PI / 180; // look-down angle
  const camD = dist * Math.cos(angle);
  const camY = dist * Math.sin(angle) + 0.5;

  return { cx, cz, camY, camD };
}

// Instantly position camera to overview of given dice list
function snapCameraToFit(diceMeshList, padding) {
  const f = calcFitCamera(diceMeshList, padding);
  camera.position.set(f.cx, f.camY, f.cz + f.camD);
  camera.lookAt(f.cx, -0.5, f.cz);
}

// Animate camera to fit given dice list
function tweenCameraToFit(diceMeshList, padding, dur) {
  const f = calcFitCamera(diceMeshList, padding);
  tweenCamera(f.cx, f.camY, f.cz + f.camD, f.cx, -0.5, f.cz, dur || 700);
}

// ─── SHAKE TO ROLL ────────────────────────────────────────────────────────────
// Robust shake detector: uses a short history of acceleration magnitudes.
// Works on Android (no permission needed) and iOS 13+ (needs user-gesture permission).

let shakeActive = false;
let shakeListener = null;
let lastShakeTime = 0;

// Sliding window of recent acceleration samples for shake detection
const SHAKE_WINDOW = 300;   // ms window to evaluate
const SHAKE_THRESHOLD = 18; // m/s² — robust across Android devices
let shakeSamples = [];       // [{t, mag}]

function onMotionEvent(e) {
  // Prefer raw acceleration (no gravity) when available; fall back to with-gravity
  const raw = e.acceleration;
  const withG = e.accelerationIncludingGravity;

  let ax = 0, ay = 0, az = 0;
  if (raw && raw.x != null) {
    ax = raw.x || 0; ay = raw.y || 0; az = raw.z || 0;
  } else if (withG && withG.x != null) {
    ax = withG.x || 0; ay = withG.y || 0; az = withG.z || 0;
  } else return;

  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  const now = Date.now();

  // Keep only samples within the rolling window
  shakeSamples.push({ t: now, mag });
  shakeSamples = shakeSamples.filter(s => now - s.t < SHAKE_WINDOW);

  // Trigger if any sample in the window exceeds the threshold
  const peak = shakeSamples.reduce((m, s) => Math.max(m, s.mag), 0);
  if (peak >= SHAKE_THRESHOLD && now - lastShakeTime > 1200) {
    lastShakeTime = now;
    shakeSamples = []; // reset to avoid re-triggering
    initiateRoll();
  }
}

function setShakeButtonState(active, message) {
  const btn = document.getElementById('shake-btn');
  if (!btn) return;
  if (active) {
    btn.style.color = 'var(--gold)';
    btn.style.borderColor = 'rgba(255,180,0,0.5)';
    btn.title = 'Shake active — shake device to roll';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg> Shake ✓`;
  } else {
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.title = message || 'Tap to enable shake-to-roll';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2 Q1 7 3 12M11 2 Q13 7 11 12M5 1 L9 1M5 13 L9 13"/></svg> Shake`;
  }
}

function enableShake() {
  if (shakeActive) return; // already on, idempotent
  if (shakeListener) {
    window.removeEventListener('devicemotion', shakeListener);
    shakeListener = null;
  }
  shakeListener = onMotionEvent;
  window.addEventListener('devicemotion', shakeListener);
  shakeActive = true;
  setShakeButtonState(true);
}

function requestMotionPermission() {
  // iOS 13+ requires explicit permission from a user gesture
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          enableShake();
        } else {
          setShakeButtonState(false, 'Permission denied');
        }
      })
      .catch(() => setShakeButtonState(false, 'Permission error'));
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    // Android and other browsers — no permission step needed
    enableShake();
  } else {
    // Desktop or unsupported browser
    setShakeButtonState(false, 'Accelerometer not supported');
  }
}

function renderHistoryPanel() {

  el.innerHTML = '';
  rollHistory.slice(0, 30).forEach(entry => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="hist-total">${entry.total}</div>
      <div class="hist-detail">${entry.breakdown}${entry.modifier ? ` (mod ${entry.modifier>=0?'+':''}${entry.modifier})` : ''}</div>
      <div class="hist-time">${entry.time}</div>
    `;
    el.appendChild(item);
  });
}

function clearHistory() {
  rollHistory = [];
  try { localStorage.removeItem('fof_history'); } catch(e){}
  renderHistoryPanel();
}

function renderSavedList() {
  const el = document.getElementById('saved-list');
  if (savedConfigs.length === 0) {
    el.innerHTML = '<p style="font-size:13px;color:var(--text-muted)">No saved configurations.</p>'; return;
  }
  el.innerHTML = '';
  savedConfigs.forEach((cfg, i) => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.innerHTML = `
      <button class="saved-delete" onclick="deleteSaved(${i})">✕</button>
      <div class="saved-card-title">${cfg.name}</div>
      <div class="saved-card-detail">${formatConfig(cfg)} · Skin: ${cfg.skin} · BG: ${cfg.bg || 'dark'} · Mod: ${cfg.modifier >= 0 ? '+' : ''}${cfg.modifier}</div>
    `;
    card.onclick = (e) => { if (!e.target.classList.contains('saved-delete')) loadSaved(i); };
    el.appendChild(card);
  });
}

function formatConfig(cfg) {
  return DICE_TYPES.filter(t => cfg.dice[t] > 0).map(t => `${cfg.dice[t]}${t}`).join(' + ') || 'No dice';
}

function saveCurrentConfig() {
  const name = document.getElementById('save-name').value.trim() || 'Roll Config';
  const cfg = {
    name,
    dice: Object.assign({}, diceConfig),
    modifier,
    skin: currentSkin,
    sound: currentSound,
    bg: currentBg,
    customBgColor: document.getElementById('bg-color-picker').value
  };
  savedConfigs.push(cfg);
  try { localStorage.setItem('fof_saved', JSON.stringify(savedConfigs)); } catch(e){}
  document.getElementById('save-name').value = '';
  closePanel('save');
  renderSavedList();
}

function deleteSaved(i) {
  savedConfigs.splice(i, 1);
  try { localStorage.setItem('fof_saved', JSON.stringify(savedConfigs)); } catch(e){}
  renderSavedList();
}

function loadSaved(i) {
  const cfg = savedConfigs[i];
  Object.assign(diceConfig, cfg.dice);
  modifier = cfg.modifier;
  currentSkin = cfg.skin;
  currentSound = cfg.sound;
  if (cfg.bg) {
    setBackground(cfg.bg);
    if (cfg.bg === 'custom' && cfg.customBgColor) {
      setCustomBg(cfg.customBgColor);
      document.getElementById('bg-color-picker').value = cfg.customBgColor;
    } else if (cfg.customBgColor && cfg.bg === 'dark') {
      // may have used custom color picker on top of dark
      document.getElementById('bg-color-picker').value = cfg.customBgColor;
    }
  }
  updateModifierDisplay();
  renderDiceSelectors();
  closePanel('menu');
}

// ─── MODIFIER ─────────────────────────────────────────────────────────────────
function changeModifier(delta) { setModifier(modifier + delta); }
function setModifier(val) {
  modifier = Math.max(-99, Math.min(99, val));
  updateModifierDisplay();
}
function updateModifierDisplay() {
  document.getElementById('mod-value').textContent = (modifier >= 0 ? '+' : '') + modifier;
  document.getElementById('modifier-chip').textContent = 'MOD: ' + (modifier >= 0 ? '+' : '') + modifier;
}

// ─── ADV/DIS ──────────────────────────────────────────────────────────────────
function toggleAdv() {
  advantage = !advantage;
  if (advantage) disadvantage = false;
  document.getElementById('adv-btn').classList.toggle('active', advantage);
  document.getElementById('dis-btn').classList.toggle('active', false);
}
function toggleDis() {
  disadvantage = !disadvantage;
  if (disadvantage) advantage = false;
  document.getElementById('dis-btn').classList.toggle('active', disadvantage);
  document.getElementById('adv-btn').classList.toggle('active', false);
}

// ─── BACKGROUND EFFECTS ───────────────────────────────────────────────────────
let bgAnimId = null;

function setBackground(type) {
  currentBg = type;
  if (bgAnimId) { cancelAnimationFrame(bgAnimId); bgAnimId = null; }
  bgParticles = [];

  const wrap = document.getElementById('canvas-wrap');
  if (bgCanvas) { bgCanvas.remove(); bgCanvas = null; bgCtx = null; }

  const needsCanvas = ['snow','ember','grid','dark','stone'].includes(type);
  if (needsCanvas) {
    bgCanvas = document.createElement('canvas');
    bgCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1';
    wrap.insertBefore(bgCanvas, wrap.firstChild);
    bgCtx = bgCanvas.getContext('2d');
    resizeBg();
    window.addEventListener('resize', resizeBg);
  }

  wrap.style.background = type === 'none' ? 'transparent' : '#000';

  if (type === 'snow')  { initSnow();   bgLoop(); }
  else if (type === 'ember') { initEmbers(); bgLoop(); }
  else if (type === 'grid')  { drawGrid(); }
  else if (type === 'dark')  { drawVoidBg(0); bgLoop(); }
  else if (type === 'stone') { drawStoneBg(); }
}

function bgLoop() {
  let t = 0;
  function step() {
    t += 0.016;
    if (currentBg === 'dark') drawVoidBg(t);
    else if (currentBg === 'snow') updateBgParticlesFrame();
    else if (currentBg === 'ember') updateBgParticlesFrame();
    bgAnimId = requestAnimationFrame(step);
  }
  bgAnimId = requestAnimationFrame(step);
}

// Dark background: whirling void with spiral arms and drifting motes
function drawVoidBg(t) {
  if (!bgCtx) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  const cx = w/2, cy = h/2;
  bgCtx.clearRect(0,0,w,h);

  // Deep void gradient
  const radGrad = bgCtx.createRadialGradient(cx,cy, 0, cx,cy, Math.max(w,h)*0.7);
  radGrad.addColorStop(0, `rgba(20,0,40,${0.6 + Math.sin(t*0.4)*0.1})`);
  radGrad.addColorStop(0.5, 'rgba(5,0,15,0.85)');
  radGrad.addColorStop(1, 'rgba(0,0,5,0.95)');
  bgCtx.fillStyle = radGrad;
  bgCtx.fillRect(0,0,w,h);

  // Spiral arms
  const arms = 3;
  for (let arm = 0; arm < arms; arm++) {
    const armOffset = (arm / arms) * Math.PI * 2;
    bgCtx.beginPath();
    let first = true;
    for (let i = 0; i < 200; i++) {
      const r = (i / 200) * Math.min(w,h) * 0.48;
      const angle = (i / 200) * Math.PI * 5 + armOffset + t * 0.12;
      const px = cx + Math.cos(angle) * r;
      const py = cy + Math.sin(angle) * r;
      const alpha = (1 - i/200) * 0.12;
      if (first) { bgCtx.moveTo(px,py); first = false; }
      else bgCtx.lineTo(px,py);
    }
    const hue = 260 + arm * 30;
    bgCtx.strokeStyle = `hsla(${hue},80%,60%,0.15)`;
    bgCtx.lineWidth = 2;
    bgCtx.stroke();
  }

  // Drifting void motes
  if (bgParticles.length === 0) {
    bgParticles = Array.from({length:60}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      r: Math.random()*1.5+0.3,
      angle: Math.random()*Math.PI*2,
      orbitR: Math.random()*Math.min(w,h)*0.4 + 20,
      speed: (Math.random()-0.5)*0.003 + 0.001,
      hue: 240 + Math.random()*80
    }));
  }
  bgParticles.forEach(p => {
    p.angle += p.speed;
    p.x = cx + Math.cos(p.angle + t*0.05) * p.orbitR;
    p.y = cy + Math.sin(p.angle + t*0.05) * p.orbitR * 0.6;
    const alpha = 0.3 + Math.sin(p.angle * 3 + t)*0.2;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    bgCtx.fillStyle = `hsla(${p.hue},70%,70%,${alpha})`;
    bgCtx.fill();
  });

  // Central glow
  const coreGrad = bgCtx.createRadialGradient(cx,cy,0, cx,cy,Math.min(w,h)*0.25);
  coreGrad.addColorStop(0, `rgba(80,0,160,${0.12 + Math.sin(t*0.7)*0.04})`);
  coreGrad.addColorStop(1, 'rgba(20,0,60,0)');
  bgCtx.fillStyle = coreGrad;
  bgCtx.fillRect(0,0,w,h);
}

// Stone background: cracked dungeon wall
function drawStoneBg() {
  if (!bgCtx) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);

  // Base stone color with noise-like variation
  const id = bgCtx.createImageData(w, h);
  const d = id.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Multi-frequency value noise approximation
      const v = (
        Math.sin(x * 0.08 + 1.2) * Math.cos(y * 0.09 + 0.7) +
        Math.sin(x * 0.19 + y * 0.13) * 0.5 +
        Math.sin(x * 0.37 + 2.1) * Math.cos(y * 0.31 + 1.8) * 0.25
      ) * 0.4 + 0.5;
      const base = 28 + v * 30;
      const idx = (y * w + x) * 4;
      d[idx]   = Math.floor(base * 1.05);
      d[idx+1] = Math.floor(base * 0.95);
      d[idx+2] = Math.floor(base * 0.85);
      d[idx+3] = 255;
    }
  }
  bgCtx.putImageData(id,0,0);

  // Draw stone blocks (mortar grid)
  const BLOCK_W = Math.floor(w / 5);
  const BLOCK_H = Math.floor(h / 8);
  bgCtx.strokeStyle = 'rgba(0,0,0,0.6)';
  bgCtx.lineWidth = 2;
  for (let row = 0; row <= 8; row++) {
    const y2 = row * BLOCK_H;
    bgCtx.beginPath(); bgCtx.moveTo(0, y2); bgCtx.lineTo(w, y2); bgCtx.stroke();
    for (let col = 0; col <= 6; col++) {
      // Offset alternating rows for brick pattern
      const xOff = (row % 2 === 0) ? 0 : BLOCK_W / 2;
      const x2 = col * BLOCK_W + xOff;
      bgCtx.beginPath(); bgCtx.moveTo(x2, y2); bgCtx.lineTo(x2, y2 + BLOCK_H); bgCtx.stroke();
    }
  }

  // Mortar fill (slightly lighter lines)
  bgCtx.strokeStyle = 'rgba(60,55,50,0.5)';
  bgCtx.lineWidth = 3;
  for (let row = 0; row <= 8; row++) {
    const y2 = row * BLOCK_H;
    bgCtx.beginPath(); bgCtx.moveTo(0, y2); bgCtx.lineTo(w, y2); bgCtx.stroke();
  }

  // Cracks — jagged multi-segment lines
  const rng = (s) => { let x = Math.sin(s * 127.1) * 43758.5453; return x - Math.floor(x); };
  bgCtx.strokeStyle = 'rgba(0,0,0,0.7)';
  bgCtx.lineWidth = 1;
  for (let c = 0; c < 18; c++) {
    let cx2 = rng(c * 3.1) * w;
    let cy2 = rng(c * 7.3) * h;
    bgCtx.beginPath(); bgCtx.moveTo(cx2, cy2);
    const segs = 4 + Math.floor(rng(c * 2.2) * 6);
    for (let s = 0; s < segs; s++) {
      cx2 += (rng(c * 10 + s * 4.1) - 0.5) * 40;
      cy2 += (rng(c * 9  + s * 3.7) - 0.5) * 40;
      bgCtx.lineTo(cx2, cy2);
    }
    bgCtx.stroke();
    // Secondary thin hairline crack
    bgCtx.strokeStyle = 'rgba(0,0,0,0.3)';
    bgCtx.lineWidth = 0.5;
    bgCtx.stroke();
    bgCtx.strokeStyle = 'rgba(0,0,0,0.7)';
    bgCtx.lineWidth = 1;
  }

  // Dampness/shadow vignette
  const vig = bgCtx.createRadialGradient(w/2,h/2, Math.min(w,h)*0.2, w/2,h/2, Math.max(w,h)*0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.65)');
  bgCtx.fillStyle = vig;
  bgCtx.fillRect(0,0,w,h);

  // Moisture streaks running down
  bgCtx.strokeStyle = 'rgba(40,50,60,0.2)';
  bgCtx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const sx = rng(i * 5.5) * w;
    bgCtx.beginPath(); bgCtx.moveTo(sx, 0);
    let cx3 = sx;
    for (let s = 0; s < 10; s++) {
      cx3 += (rng(i + s * 0.3) - 0.5) * 10;
      bgCtx.lineTo(cx3, s * h / 10);
    }
    bgCtx.stroke();
  }
}

function resizeBg() {
  if (!bgCanvas) return;
  const wrap = document.getElementById('canvas-wrap');
  bgCanvas.width = wrap.clientWidth;
  bgCanvas.height = wrap.clientHeight;
  bgParticles = []; // reset particles so they respawn to new size
  if (currentBg === 'grid') drawGrid();
  else if (currentBg === 'stone') drawStoneBg();
  // dark/snow/ember reinitialise naturally in their loops
}

function drawGrid() {
  if (!bgCtx) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.fillStyle = '#070712'; bgCtx.fillRect(0,0,w,h);
  bgCtx.strokeStyle = 'rgba(80,140,255,0.08)';
  bgCtx.lineWidth = 0.5;
  const step = 40;
  for (let x = 0; x < w; x += step) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
  for (let y = 0; y < h; y += step) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }
}

function initSnow() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgParticles = Array.from({length:80}, () => ({
    x: Math.random()*w, y: Math.random()*h,
    r: Math.random()*2+0.5,
    speed: Math.random()*0.8+0.2,
    drift: (Math.random()-0.5)*0.3,
    opacity: Math.random()*0.5+0.2
  }));
}

function initEmbers() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgParticles = Array.from({length:60}, () => ({
    x: Math.random()*w, y: h + Math.random()*50,
    r: Math.random()*2+0.5,
    speed: Math.random()*1.5+0.5,
    drift: (Math.random()-0.5)*0.5,
    life: Math.random(),
    opacity: 0
  }));
}

function updateBgParticlesFrame() {
  if (!bgCanvas || !bgCtx) return;
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  if (currentBg === 'snow') bgCtx.fillStyle = '#0e0e16';
  else if (currentBg === 'ember') bgCtx.fillStyle = '#100500';
  bgCtx.fillRect(0,0,w,h);

  bgParticles.forEach(p => {
    if (currentBg === 'snow') {
      p.y += p.speed; p.x += p.drift;
      if (p.y > h) { p.y = -5; p.x = Math.random()*w; }
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(200,220,255,${p.opacity})`;
      bgCtx.fill();
    } else if (currentBg === 'ember') {
      p.y -= p.speed; p.x += p.drift; p.life += 0.01;
      p.opacity = Math.sin(p.life * Math.PI) * 0.7;
      if (p.y < -10 || p.life > 1) {
        p.y = h + 10; p.x = Math.random()*w; p.life = 0; p.opacity = 0;
        p.speed = Math.random()*1.5+0.5; p.drift = (Math.random()-0.5)*0.5;
      }
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(255,${100+Math.random()*100},0,${p.opacity})`;
      bgCtx.fill();
    }
  });
}

// Legacy stub — called by old code paths
function updateBgParticles() {
  // handled by bgLoop() now — no-op here
}

function setCustomBg(color) {
  document.getElementById('canvas-wrap').style.background = color;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initThree();
renderDiceSelectors();
updateModifierDisplay();
setBackground('dark');
renderSavedList();

// On first user interaction: unlock Web Audio.
// Also auto-enable shake on Android (no permission API needed).
// iOS users must tap the Shake button explicitly (permission requires its own gesture).
document.body.addEventListener('pointerdown', function firstTouch() {
  document.body.removeEventListener('pointerdown', firstTouch);
  try { getAudio().resume(); } catch(e) {}
  // Auto-enable shake for Android / non-iOS browsers silently
  const needsPermission = typeof DeviceMotionEvent !== 'undefined' &&
                          typeof DeviceMotionEvent.requestPermission === 'function';
  if (!needsPermission && typeof DeviceMotionEvent !== 'undefined') {
    enableShake();
  }
});
</script>
